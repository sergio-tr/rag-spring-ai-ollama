version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/rag-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/webapp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/classifier-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
