# Shared Postgres bootstrap for Java tests and Spring Boot jobs that use the CI database.
# Matches .github/local/ci-like-verify.sh and the Backend job in .github/workflows/ci.yml:
# - extensions on vectordb (vector, hstore, uuid-ossp)
# - database testdb + src/test/resources/test-init.sql
#
# Jobs must still set service postgres (pgvector/pgvector:0.8.2-pg16-bookworm) and job env, e.g.:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
#   RAG_TEST_USE_TESTCONTAINERS_DATASOURCE=false, INTEGRATION_JDBC_URL (for mvn verify)
name: Prepare Postgres for RAG tests
description: Apply CI Postgres extensions and integration test DB (vectordb + testdb).

runs:
  using: composite
  steps:
    - name: Install PostgreSQL client
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Wait for Postgres, extensions, testdb, test-init
      shell: bash
      run: |
        set -euo pipefail
        ready=0
        # Max wall-clock ~60s (30 * 2s) per CI execution contract
        for _ in $(seq 1 30); do
          if pg_isready -h localhost -p 5432 -U postgres; then
            ready=1
            break
          fi
          sleep 2
        done
        if [ "$ready" != 1 ]; then
          echo "::error::Postgres did not become ready on localhost:5432"
          exit 1
        fi
        PGPASSWORD=postgres psql -h localhost -U postgres -d vectordb -v ON_ERROR_STOP=1 \
          -f .github/local/ci-postgres-extensions.sql
        if ! PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -tAc \
          "SELECT 1 FROM pg_database WHERE datname = 'testdb'" | grep -q 1; then
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE testdb;"
        fi
        PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 \
          -f rag-service/src/test/resources/test-init.sql
