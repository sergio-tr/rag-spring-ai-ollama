name: Documentation (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend Javadoc
        working-directory: rag-service
        run: ./mvnw -q javadoc:javadoc -DskipTests

      - uses: ./.github/actions/cache-npm-webapp

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: webapp/package.json
          package-manager-cache: false

      - name: Build frontend TypeDoc
        working-directory: webapp
        run: |
          npm install --no-audit --no-fund
          npm run doc

      - name: Assemble public documentation site
        run: |
          set -euo pipefail
          SITE_DIR=docs-site
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR/backend-javadoc" "$SITE_DIR/frontend-typedoc" "$SITE_DIR/classifier"
          cp docs/index.html "$SITE_DIR/index.html"
          cp -r rag-service/target/reports/apidocs/. "$SITE_DIR/backend-javadoc/"
          cp -r webapp/docs/api/. "$SITE_DIR/frontend-typedoc/"
          cat > "$SITE_DIR/classifier/index.html" <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Classifier service documentation</title>
          </head>
          <body>
            <h1>Classifier service</h1>
            <p>API reference generation for the classifier service is not yet wired into this site.</p>
            <p>See the <a href="../index.html">documentation hub</a> and <code>classifier-service/README.md</code> in the repository.</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # First deploy: enable Pages (GitHub Actions source) when not configured yet.
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
