# Optional: re-run Playwright smoke only (same as core_webapp_e2e in ci.yml).
# Automated PR/push runs: .github/workflows/ci.yml (unit + build + Playwright smoke).
name: E2E (Playwright) - manual

on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: webapp
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9000
      NEXT_PUBLIC_RAG_API_PREFIX: /api/v5
    steps:
      - uses: actions/checkout@v6

      - name: Cache npm (webapp)
        uses: ./.github/actions/cache-npm-webapp

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: webapp/package.json
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke (@smoke, no @fullstack)
        run: npm run test:e2e:ci-fast
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WORKERS: "1"
          PLAYWRIGHT_MAX_FAILURES: "1"
          PLAYWRIGHT_RETRIES: "0"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-smoke-report
          path: webapp/playwright-report/
          retention-days: 7
