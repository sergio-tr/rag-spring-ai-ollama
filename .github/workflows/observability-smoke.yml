# Legacy compose filename regression + schedule. Full compose validation: docker-compose-ci.yml.
# Schedule / manual — does not block PR merges by default.
name: Observability smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker/**"
      - ".github/workflows/observability-smoke.yml"
  schedule:
    - cron: "45 6 * * *"

concurrency:
  group: observability-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ollama-overlay-name-regression:
    name: No removed compose fragments under docker/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fail if merged/removed compose files reappear
        run: |
          set -euo pipefail
          for f in compose.ollama-gpu.yml compose.ollama-local-gpu.yml compose.ollama-local-gpu.dev.yml compose.logs.yml compose.infra.yml compose.dev-web.yml; do
            if [ -f "docker/$f" ]; then
              echo "::error::Unexpected docker/$f — use docker-compose.yml and Compose profiles."
              exit 1
            fi
          done
          echo "OK: no legacy compose fragment files under docker/."

