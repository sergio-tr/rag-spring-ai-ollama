name: SonarCloud Analysis

# Triggers:
#   - Push to main or dev (full branch analysis)
#   - Pull Requests targeting main or dev (PR decoration + gate check)
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
    types: [opened, synchronize, reopened]

# Required permissions for SonarCloud PR decoration
permissions:
  contents: read
  pull-requests: read   # Read PR metadata for inline PR decoration
  checks: write         # Write check-run status badge on PRs

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    # Same Postgres setup as ci.yml — required for @SpringBootTest and JDBC integration tests during mvn verify.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vectordb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vectordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RAG_TEST_USE_TESTCONTAINERS_DATASOURCE: "false"
      INTEGRATION_JDBC_URL: jdbc:postgresql://localhost:5432/testdb

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────────
      # fetch-depth: 0 is REQUIRED by SonarCloud — it needs the full git history
      # to compute blame (new code attribution) and blame-based deduplication.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      # Windows checkouts often lose the executable bit on mvnw; Linux requires +x for ./mvnw
      - name: Ensure Maven wrapper is executable
        working-directory: rag-service
        run: chmod +x mvnw

      # ─── Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: classifier-service/requirements.txt

      # ─── Java: build + tests + JaCoCo coverage report ─────────────────────
      # `verify` lifecycle = compile → test (with JaCoCo agent) → jacoco:report
      # Output: rag-service/target/classes/  (binaries for Sonar)
      #         rag-service/target/site/jacoco/jacoco.xml  (coverage for Sonar)
      - name: Prepare Postgres for tests (extensions, integration DB)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in $(seq 1 40); do
            if pg_isready -h localhost -p 5432 -U postgres; then break; fi
            sleep 2
          done
          PGPASSWORD=postgres psql -h localhost -U postgres -d vectordb -v ON_ERROR_STOP=1 -c \
            "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS hstore; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          if ! PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = 'testdb'" | grep -q 1; then
            PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE testdb;"
          fi
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f rag-service/src/test/resources/test-init.sql

      # Note: With the service + env above, tests use the runner Postgres; Testcontainers is not required in CI.
      - name: Build backend and generate Java coverage (mvn verify)
        working-directory: rag-service
        run: ./mvnw -B verify --no-transfer-progress
        env:
          # Do not set OTEL_EXPORTER_OTLP_ENDPOINT to "" — Spring resolves ${OTEL:default} to empty and breaks OTLP URLs.
          MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED: "false"

      # ─── Java: copy dependencies for SonarCloud type resolution ───────────
      # sonar.java.libraries in sonar-project.properties points to this directory.
      # Without it, the SonarScanner cannot resolve third-party types and produces
      # false positives and misses issues. Deps are already in ~/.m2 after verify;
      # this step just copies them to the path Sonar expects.
      - name: Copy Maven dependencies for SonarCloud
        working-directory: rag-service
        run: ./mvnw -B dependency:copy-dependencies -DoutputDirectory=target/dependency --no-transfer-progress

      # ─── Python: install dependencies ─────────────────────────────────────
      - name: Install Python dependencies
        working-directory: classifier-service
        run: pip install -r requirements.txt

      # ─── Python: tests + coverage ─────────────────────────────────────────
      # pytest.ini already sets addopts with --cov=app --cov-report=xml:coverage.xml.
      # Do NOT duplicate those flags here — they are applied by pytest.ini automatically.
      # Only pass test paths and marker filters; pytest.ini handles the rest.
      # Output: classifier-service/coverage.xml  (referenced in sonar-project.properties)
      - name: Run classifier tests with coverage
        working-directory: classifier-service
        run: |
          pytest tests/unit tests/regression/test_baseline_lib.py \
            -m "not integration and not slow" \
            -v
        env:
          MODELS_DIR: ./models
          DATA_DIR: ./data

      # ─── Webapp: Vitest coverage (LCOV for Sonar; Vitest remains the frontend gate) ───
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies and generate LCOV
        working-directory: webapp
        run: |
          npm ci
          npm run test:coverage

      # ─── SonarCloud scan ──────────────────────────────────────────────────
      # Reads sonar-project.properties from the repository root.
      # All coverage artifacts must exist before this step runs.
      #
      # SonarCloud project: disable "Automatic Analysis" (CI-based scan only).
      # If both are on, the scanner fails with: "CI analysis while Automatic Analysis is enabled".
      # Path (approx.): SonarCloud project → Administration → Analysis Method → CI / disable Auto.
      #
      # Required secrets (GitHub → Settings → Secrets and variables → Actions):
      #   SONAR_TOKEN — SonarCloud → My Account → Security → Generate token
      #
      # If SONAR_TOKEN is empty, the scanner fails with "Project not found" (misleading).
      # Common causes: secret not added, or PR from a fork (secrets are not passed to
      # workflows triggered by forks unless you use pull_request_target — use with care).
      - name: Require SONAR_TOKEN for SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is missing. Add the repository secret (SonarCloud → Account → Security). Fork PRs do not receive repository secrets by default."
            exit 1
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
