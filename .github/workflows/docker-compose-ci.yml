# Validates Docker Compose policy, generated .env chain, and docker compose config merge.
# Complements reusable-ci-core "Compose structural guard" (runs on every PR) with full `docker compose config`
# on representative file sets. This workflow is path-filtered; see docs/devops/README.md.
name: Docker Compose CI

on:
  workflow_dispatch:
  pull_request:
    branches: [dev, main, master]
    paths:
      - "docker/**"
      - ".github/workflows/docker-compose-ci.yml"
  push:
    branches: [dev, main, master]
    paths:
      - "docker/**"
      - ".github/workflows/docker-compose-ci.yml"

concurrency:
  group: docker-compose-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Env, compose guard, docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML for compose_guard
        run: python3 -m pip install --user -q pyyaml

      - name: Create .env files (create-env-all.sh + sync)
        run: |
          set -euo pipefail
          bash ./docker/scripts/create-env-all.sh --force

      - name: Compose policy guard (structural rules)
        run: |
          set -euo pipefail
          python3 docker/scripts/compose_guard.py \
            --only-rules image_forbidden,yaml_error,build_invalid,build_missing_context,build_missing_dockerfile

      - name: docker compose config — base + profiles
        working-directory: docker
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml \
            --profile logs \
            --env-file ../observability/.env \
            config -q

      - name: docker compose config — obs overlays + profiles
        working-directory: docker
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f compose.obs.yml \
            --profile observability \
            --profile logs \
            --profile infra \
            --env-file ../db/.env \
            --env-file ../classifier-service/.env \
            --env-file ../rag-service/.env \
            --env-file ../webapp/.env \
            --env-file ../observability/.env \
            config -q

      - name: docker compose config — prod-like
        working-directory: docker
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f compose.prod.yml \
            --profile observability \
            --env-file ../db/.env \
            --env-file ../classifier-service/.env \
            --env-file ../rag-service/.env \
            --env-file ../webapp/.env \
            --env-file ../observability/.env \
            config -q
