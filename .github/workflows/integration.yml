# Stack HTTP integration tests (pytest + httpx). No browser; no observability stack by default.
# Classifier-specific cases skip if classifier-service is not reachable (this job starts backend only).
name: Stack integration (pytest)

on:
  # Manual tool only: the authoritative CI DAG (ci.yml → reusable-ci-core.yml)
  # already runs stack integration on PRs and on push to main/master.
  workflow_dispatch: {}
concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POSTGRES_SERVICE_IMAGE: pgvector/pgvector:0.8.2-pg16-bookworm

jobs:
  stack-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        # Do NOT use `env.*` in `services.<id>.image` (context may be unsupported).
        image: ${{ vars.POSTGRES_SERVICE_IMAGE }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vectordb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # Path A: Postgres from GHA service (not Python Testcontainers). Pytest stays HTTP-only.
      INTEGRATION_USE_TESTCONTAINERS: "0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vectordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RAG_CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      RAG_JWT_SECRET: e2e-ci-jwt-secret-must-be-at-least-32-chars
      # Same DB bootstrap as ci.yml backend (prepare-postgres-for-rag-tests action).
      RAG_TEST_USE_TESTCONTAINERS_DATASOURCE: "false"
      INTEGRATION_JDBC_URL: jdbc:postgresql://localhost:5432/testdb
      INTEGRATION_CHECK_OBS: "0"
      INTEGRATION_BACKEND_URL: http://127.0.0.1:9000
      INTEGRATION_CLASSIFIER_URL: http://127.0.0.1:8000
      INTEGRATION_ADMIN_EMAIL: admin@e2e.local
      INTEGRATION_ADMIN_PASSWORD: e2e
      RAG_HEALTH_OLLAMA_ENABLED: "false"
      RAG_HEALTH_CLASSIFIER_ENABLED: "false"

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Prepare Postgres for tests (extensions, integration DB)
        uses: ./.github/actions/prepare-postgres-for-rag-tests

      - name: Start Spring Boot (profile e2e)
        run: |
          cd rag-service
          chmod +x mvnw
          nohup ./mvnw -B -DskipTests spring-boot:run -Dspring-boot.run.profiles=e2e \
            > /tmp/spring-integration.log 2>&1 &
          echo $! > /tmp/spring-integration.pid

      - name: Wait for Actuator health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:9000/actuator/health >/dev/null 2>&1; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "--- spring log (tail) ---"
          tail -n 200 /tmp/spring-integration.log || true
          exit 1

      - name: Seed e2e admin user (for pytest)
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h localhost -U postgres -d vectordb -v ON_ERROR_STOP=1 -c "
            INSERT INTO users (id, email, password_hash, name, role, created_at, email_verified, email_verified_at)
            VALUES (
              'e2e0ad00-0000-4000-8000-000000000001',
              'admin@e2e.local',
              '{noop}e2e',
              'E2E Admin',
              'ADMIN',
              CURRENT_TIMESTAMP,
              true,
              CURRENT_TIMESTAMP
            )
            ON CONFLICT (email) DO UPDATE SET
              password_hash = EXCLUDED.password_hash,
              name = EXCLUDED.name,
              role = EXCLUDED.role,
              email_verified = true,
              email_verified_at = COALESCE(users.email_verified_at, EXCLUDED.email_verified_at);
          "

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install integration test deps
        run: pip install -r tests/integration/requirements.txt

      - name: pytest (stack integration)
        # HTTP-only: Path B (test_tc_postgres_smoke) is local Docker optional; see tests/integration/README.md
        run: python -m pytest tests/integration -v --tb=short --ignore=tests/integration/test_tc_postgres_smoke.py

      - name: Stop Spring Boot
        if: always()
        run: |
          if [ -f /tmp/spring-integration.pid ]; then kill "$(cat /tmp/spring-integration.pid)" 2>/dev/null || true; fi

      - name: Upload Spring log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: spring-integration-log
          path: /tmp/spring-integration.log
          retention-days: 7
