name: Deploy (Docker Compose)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Validate required configuration
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -euo pipefail
          required_vars=(DEPLOY_DIR DEPLOY_HEALTH_URL)
          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required (set as a repository or environment variable)"
              exit 1
            fi
          done
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "::error::DEPLOY_DIR is not a git repository: $DEPLOY_DIR"
            exit 1
          fi
          echo "Deploy directory: $DEPLOY_DIR"
          echo "Health check URL configured (value not printed)."

      - name: Sync repository to origin/main
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main
          echo "Deployed commit: $(git rev-parse --short HEAD)"

      - name: Validate Compose configuration
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          ./docker/scripts/docker-compose.sh config prod --server --obs --obs-private --no-env-prompt

      - name: Deploy stack
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          ./docker/scripts/docker-compose.sh build prod --server --obs --obs-private --no-env-prompt
          ./docker/scripts/docker-compose.sh up prod --server --obs --obs-private --no-env-prompt

      - name: Post-deploy health check
        env:
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -euo pipefail
          curl -fsS --max-time 120 "$DEPLOY_HEALTH_URL"

      - name: Deployment diagnostics
        if: always()
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: |
          set -euo pipefail
          cd docker
          docker compose \
            -f docker-compose.yml \
            -f compose.obs.yml \
            -f compose.prod.yml \
            -f compose.prod-server.yml \
            -f compose.prod-obs.yml \
            --profile observability \
            ps || true
