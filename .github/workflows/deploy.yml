name: Deploy to VM (Docker Compose)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            REPO_DIR="${{ secrets.VM_DEPLOY_DIR }}"
            cd "$REPO_DIR"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            docker compose -f docker/docker-compose.yml -f docker/compose.prod.yml pull || true
            docker compose -f docker/docker-compose.yml -f docker/compose.prod.yml up -d

