# Publishes ghcr.io/<owner>/rag-spring-ai-ollama-<service>:<github_sha> and :latest.
# For reproducible deploy/rollback, pin images by the SHA tag; do not treat :latest as contractual.
name: Build & push images (GHCR)

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/rag-spring-ai-ollama

jobs:
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: db
            context: db
          - service: rag-service
            context: rag-service
          - service: classifier-service
            context: classifier-service
          - service: otel-collector
            context: observability/otel-collector
          - service: jaeger
            context: observability/jaeger
          - service: prometheus
            context: observability/prometheus
          - service: grafana
            context: observability/grafana
          - service: reverse-proxy
            context: reverse-proxy
          - service: webapp
            context: webapp
          - service: ollama
            context: ollama

    steps:
      - uses: actions/checkout@v4

      - name: Gate on CI + fullstack E2E (Playwright)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const required = [
              { name: 'CI', path: '.github/workflows/ci.yml' },
              { name: 'E2E fullstack (Playwright UI + API)', path: '.github/workflows/e2e-fullstack.yml' },
            ];

            const listWorkflows = await github.rest.actions.listRepoWorkflows({ owner, repo, per_page: 100 });
            const byPath = new Map(listWorkflows.data.workflows.map(w => [w.path, w]));

            for (const r of required) {
              const wf = byPath.get(r.path);
              if (!wf) {
                core.setFailed(`Required workflow not found: ${r.path}`);
                return;
              }
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: wf.id,
                head_sha: sha,
                per_page: 10,
              });
              const run = runs.data.workflow_runs.find(x => x.head_sha === sha);
              if (!run) {
                core.setFailed(`Missing required workflow run for ${r.name} at ${sha}`);
                return;
              }
              if (run.status !== 'completed' || run.conclusion !== 'success') {
                core.setFailed(`Required workflow failed/not complete: ${r.name} (status=${run.status}, conclusion=${run.conclusion})`);
                return;
              }
              core.info(`Gate OK: ${r.name}`);
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:latest

