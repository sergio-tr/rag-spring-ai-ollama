name: Build & push images (GHCR)

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/rag-spring-ai-ollama

jobs:
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: db
            context: db
          - service: rag-service
            context: rag-service
          - service: classifier-service
            context: classifier-service
          - service: otel-collector
            context: observability/otel-collector
          - service: jaeger
            context: observability/jaeger
          - service: prometheus
            context: observability/prometheus
          - service: grafana
            context: observability/grafana
          - service: reverse-proxy
            context: reverse-proxy
          - service: ollama
            context: ollama

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${{ matrix.service }}:latest

