# Publishes ghcr.io/<owner>/rag-spring-ai-ollama-<service> with tags:
#   - Git release tag (e.g. v1.0.0) when triggered by release:published, or optional workflow_dispatch image_tag
#   - full commit SHA (canonical for reproducible deploy/rollback)
#   - latest (non-contractual)
#
# Trigger: GitHub Release published, or manual workflow_dispatch (optional ref + image_tag).
# CI must have completed successfully for the resolved commit before images build.
name: Build & push images (GHCR)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout (branch, tag, or full SHA)'
        required: false
        default: main
      image_tag:
        description: 'Extra image tag besides SHA and latest (ignored on release events; use release tag instead)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ${{ github.repository_owner }}/rag-spring-ai-ollama
  # Poll until ci.yml finishes (releases/dispatch often race CI on the same SHA).
  CI_GATE_POLL_MS: "30000"
  CI_GATE_TIMEOUT_MS: "5400000"

jobs:
  gate:
    name: Gate (CI OK for resolved SHA)
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          # release.tag_name only exists for release events; workflow_dispatch uses inputs.ref
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0

      - name: Resolve commit SHA and version tag
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          VERSION_TAG=""
          if [ "${EVENT_NAME}" = "release" ]; then
            VERSION_TAG="${RELEASE_TAG}"
          elif [ -n "${INPUT_IMAGE_TAG}" ]; then
            VERSION_TAG="${INPUT_IMAGE_TAG}"
          fi
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION_TAG=${VERSION_TAG:-<none>}, COMMIT_SHA=${COMMIT_SHA}"

      - name: Gate on CI (full DAG)
        uses: actions/github-script@v8
        env:
          RESOLVED_SHA: ${{ steps.resolve.outputs.commit_sha }}
          CI_GATE_POLL_MS: ${{ env.CI_GATE_POLL_MS }}
          CI_GATE_TIMEOUT_MS: ${{ env.CI_GATE_TIMEOUT_MS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.RESOLVED_SHA;

            const pollMs = Number.parseInt(process.env.CI_GATE_POLL_MS || '30000', 10);
            const timeoutMs = Number.parseInt(process.env.CI_GATE_TIMEOUT_MS || String(90 * 60 * 1000), 10);

            const required = [
              { name: 'CI', path: '.github/workflows/ci.yml' },
            ];

            const listWorkflows = await github.rest.actions.listRepoWorkflows({ owner, repo, per_page: 100 });
            const byPath = new Map(listWorkflows.data.workflows.map(w => [w.path, w]));

            async function sleep(ms) {
              await new Promise(resolve => setTimeout(resolve, ms));
            }

            for (const req of required) {
              const wf = byPath.get(req.path);
              if (!wf) {
                core.setFailed(`Required workflow not found: ${req.path}`);
                return;
              }
              const deadline = Date.now() + timeoutMs;
              let passed = false;
              while (Date.now() < deadline) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: wf.id,
                  head_sha: sha,
                  per_page: 10,
                });
                const run = runs.data.workflow_runs.find(x => x.head_sha === sha);
                if (!run) {
                  core.info(`Gate: no run yet for ${req.name} at ${sha}; waiting ${pollMs / 1000}s…`);
                  await sleep(pollMs);
                  continue;
                }
                if (run.status !== 'completed') {
                  core.info(`Gate: ${req.name} status=${run.status}; waiting ${pollMs / 1000}s…`);
                  await sleep(pollMs);
                  continue;
                }
                if (run.conclusion !== 'success') {
                  core.setFailed(`Required workflow failed: ${req.name} (conclusion=${run.conclusion})`);
                  return;
                }
                core.info(`Gate OK: ${req.name}`);
                passed = true;
                break;
              }
              if (!passed) {
                core.setFailed(`Timeout waiting for ${req.name} (${timeoutMs}ms) at ${sha}`);
                return;
              }
            }

  build:
    name: Build (${{ matrix.service }})
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: db
            context: db
          - service: rag-service
            context: rag-service
          - service: classifier-service
            context: classifier-service
          - service: otel-collector
            context: observability/otel-collector
          - service: jaeger
            context: observability/jaeger
          - service: prometheus
            context: observability/prometheus
          - service: grafana
            context: observability/grafana
          - service: loki
            context: observability/loki
          - service: promtail
            context: observability/promtail
          - service: node-exporter
            context: observability/node-exporter
          - service: cadvisor
            context: observability/cadvisor
          - service: reverse-proxy
            context: reverse-proxy
          - service: webapp
            context: webapp
          - service: ollama
            context: ollama

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit_sha }}
          fetch-depth: 0

      - name: Compose Docker tags
        id: docker_tags
        shell: bash
        env:
          COMMIT_SHA: ${{ needs.gate.outputs.commit_sha }}
          VERSION_TAG: ${{ needs.gate.outputs.version_tag }}
          SERVICE: ${{ matrix.service }}
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-${SERVICE}"
          {
            echo "tags<<EOF"
            echo "${BASE}:${COMMIT_SHA}"
            echo "${BASE}:latest"
            if [ -n "${VERSION_TAG}" ]; then
              echo "${BASE}:${VERSION_TAG}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
