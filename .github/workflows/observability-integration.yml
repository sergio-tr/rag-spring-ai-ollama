name: Observability integration (pytest require obs)

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

concurrency:
  group: observability-integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  obs-stack-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Create .env files
        run: bash ./docker/scripts/create-env-all.sh --force

      - name: Compose structural guard (must pass)
        run: |
          set -euo pipefail
          python3 -m pip install --user -q pyyaml
          python3 docker/scripts/compose_guard.py \
            --only-rules image_forbidden,yaml_error,build_invalid,build_missing_context,build_missing_dockerfile

      - name: Start stack with observability
        working-directory: docker
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f compose.obs.yml \
            --profile observability \
            --env-file ../db/.env \
            --env-file ../classifier-service/.env \
            --env-file ../rag-service/.env \
            --env-file ../webapp/.env \
            --env-file ../observability/.env \
            up -d --build

      - name: Wait for backend health and OTEL metrics
        run: |
          set -euo pipefail
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:9000/actuator/health >/dev/null 2>&1; then
              echo "Backend healthy"
              break
            fi
            sleep 2
          done
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8889/metrics >/dev/null 2>&1; then
              echo "OTEL metrics reachable"
              exit 0
            fi
            sleep 2
          done
          docker ps -a || true
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run pytest stack integration (require obs)
        env:
          INTEGRATION_BACKEND_URL: http://127.0.0.1:9000
          INTEGRATION_CLASSIFIER_URL: http://127.0.0.1:8000
          INTEGRATION_CHECK_OBS: "1"
          INTEGRATION_STRICT: "1"
          INTEGRATION_LOGIN_EMAIL: dev@local.test
          INTEGRATION_LOGIN_PASSWORD: dev
          INTEGRATION_ADMIN_EMAIL: admin@e2e.local
          INTEGRATION_ADMIN_PASSWORD: e2e
        run: |
          pip install -r tests/integration/requirements.txt
          python -m pytest tests/integration -v --tb=short --ignore=tests/integration/test_tc_postgres_smoke.py

      - name: Dump compose logs on failure
        if: failure()
        run: |
          cd docker
          docker compose -f docker-compose.yml -f compose.obs.yml --profile observability logs --no-color > /tmp/compose-obs.log || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: observability-integration-logs
          path: /tmp/compose-obs.log
          retention-days: 7

      - name: Shutdown stack
        if: always()
        working-directory: docker
        run: |
          docker compose -f docker-compose.yml -f compose.obs.yml --profile observability down -v

