name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vectordb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vectordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RAG_TEST_USE_TESTCONTAINERS_DATASOURCE: "false"
      # DocumentPersistenceJdbcIntegrationTest uses a dedicated DB + test-init.sql (no Testcontainers in CI).
      INTEGRATION_JDBC_URL: jdbc:postgresql://localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Prepare Postgres for tests (extensions, integration DB)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in $(seq 1 40); do
            if pg_isready -h localhost -p 5432 -U postgres; then break; fi
            sleep 2
          done
          PGPASSWORD=postgres psql -h localhost -U postgres -d vectordb -v ON_ERROR_STOP=1 -c \
            "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS hstore; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          if ! PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = 'testdb'" | grep -q 1; then
            PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE testdb;"
          fi
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f rag-service/src/test/resources/test-init.sql

      - name: Build and test
        run: |
          cd rag-service
          chmod +x mvnw
          ./mvnw -B verify

      - name: Javadoc
        run: |
          cd rag-service
          ./mvnw -B -q javadoc:javadoc

  classifier-service:
    name: Query Classifier Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd classifier-service
          pip install -r requirements.txt

      # pytest.ini + .coveragerc enforce --cov=app and fail_under=80 (plan Fase B).
      - name: Run tests with coverage gate
        run: |
          cd classifier-service
          pytest tests/ -v

  webapp:
    name: Webapp (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9000
      NEXT_PUBLIC_RAG_API_PREFIX: /api/v5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run Vitest with coverage (thresholds ≥80%)
        id: vitest_coverage
        run: npm run test:coverage

      - name: Append coverage summary to job summary
        if: success()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Vitest coverage summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: ${{ always() && (steps.vitest_coverage.outcome == 'success' || steps.vitest_coverage.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: webapp-coverage
          path: webapp/coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Build
        run: npm run build

      - name: Generate docs
        run: npm run doc

  # Playwright UI smoke: npm run test:e2e = --project=chromium --grep-invert @fullstack (see webapp/e2e/README.md). API tests use npm run test:api separately.
  webapp-e2e:
    name: Webapp E2E (Playwright smoke)
    runs-on: ubuntu-latest
    needs: [webapp]
    timeout-minutes: 25
    defaults:
      run:
        working-directory: webapp
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:9000
      NEXT_PUBLIC_RAG_API_PREFIX: /api/v5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (excludes @fullstack)
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: webapp/playwright-report/
          retention-days: 7
