# Full PR / push pipeline: single workflow_call to reusable-ci-core.yml (DAG with explicit needs:).
# Triggers: pull_request on dev/main/master (pre-merge). push on main/master only (post-merge + deploy SHA
# gate). No push@dev - avoids duplicate runs when a PR dev->main is open and dev is updated (push + synchronize).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [dev, main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: CI pipeline
    uses: ./.github/workflows/reusable-ci-core.yml
    secrets: inherit
