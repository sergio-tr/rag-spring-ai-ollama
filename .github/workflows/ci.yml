# Full PR / push pipeline: single workflow_call to reusable-ci-core.yml (DAG with explicit needs:).
name: CI

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    name: CI pipeline
    uses: ./.github/workflows/reusable-ci-core.yml
    secrets: inherit
