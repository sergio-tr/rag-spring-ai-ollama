name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vectordb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/vectordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # DocumentPersistenceJdbcIntegrationTest uses a dedicated DB + test-init.sql (no Testcontainers in CI).
      INTEGRATION_JDBC_URL: jdbc:postgresql://localhost:5432/testdb
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Prepare Postgres for tests (extensions, integration DB)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in $(seq 1 40); do
            if pg_isready -h localhost -p 5432 -U postgres; then break; fi
            sleep 2
          done
          PGPASSWORD=postgres psql -h localhost -U postgres -d vectordb -v ON_ERROR_STOP=1 -c \
            "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS hstore; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          if ! PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -tAc \
            "SELECT 1 FROM pg_database WHERE datname = 'testdb'" | grep -q 1; then
            PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE testdb;"
          fi
          PGPASSWORD=postgres psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f rag-service/src/test/resources/test-init.sql

      - name: Build and test
        run: |
          cd rag-service
          chmod +x mvnw
          ./mvnw -B verify

  classifier-service:
    name: Query Classifier Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd classifier-service
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd classifier-service
          pytest tests/ -v
