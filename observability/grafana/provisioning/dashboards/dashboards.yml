# Provisioned dashboards: load all JSON from the dashboards folder.
apiVersion: 1
providers:
  - name: "RAG Observability"
    orgId: 1
    folder: "RAG"
    folderUid: "rag"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
