global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Spring Boot backend: actuator Prometheus endpoint
  - job_name: "backend"
    static_configs:
      - targets: ["backend:9000"]
    metrics_path: /actuator/prometheus
    scrape_interval: 10s

  # OTEL Collector: metrics received from backend and classifier via OTLP, re-exported for scrape
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 15s
