# Host ports and destinations via env (observability/.env → compose passes variables to the container).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OBS_INTERNAL_OTEL_OTLP_GRPC}
      http:
        endpoint: 0.0.0.0:${env:OBS_INTERNAL_OTEL_OTLP_HTTP}
  postgresql:
    endpoint: ${env:OBS_PG_ENDPOINT}
    transport: tcp
    username: ${env:OBS_PG_EXPORTER_USER}
    password: ${env:OBS_PG_EXPORTER_PASSWORD}
    databases:
      - ${env:OBS_PG_DB}
    collection_interval: 10s
    # Brief pause before first scrape (avoids races if DNS settles after Postgres is "healthy").
    initial_delay: 5s
    # Default is TLS on; dev Postgres images usually have no SSL.
    tls:
      insecure: true

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 64
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: ${env:OTEL_COLLECTOR_LOG_LEVEL}
    sampling_initial: 5
    sampling_thereafter: 200
  otlp/jaeger:
    endpoint: ${env:OBS_OTEL_EXPORT_JAEGER_ENDPOINT}
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:${env:OBS_INTERNAL_OTEL_PROM_EXPORT}
    namespace: otel
    const_labels:
      collector: otel-collector

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging, otlp/jaeger]
    metrics:
      receivers: [otlp, postgresql]
      processors: [memory_limiter, batch]
      exporters: [logging, prometheus]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
