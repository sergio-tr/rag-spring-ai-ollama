user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Support for streaming endpoints (SSE/websocket) when the backend needs upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    upstream backend_upstream {
        server ${BACKEND_HOST}:${BACKEND_INTERNAL_PORT} max_fails=0;
    }

    upstream webapp_upstream {
        server ${WEBAPP_HOST}:${WEBAPP_INTERNAL_PORT} max_fails=0;
    }

    map "${REVERSE_PROXY_ENFORCE_HTTPS}" $redirect_to_https {
        default 0;
        "1" 1;
    }

    server {
        listen 80;
        server_name _;

        if ($redirect_to_https = 1) {
            # Host-published HTTPS port (e.g. dev :8444); empty suffix when TLS is on host :443.
            return 301 https://$host$REVERSE_PROXY_HTTPS_PORT_SUFFIX$request_uri;
        }

        location ~ ^${RAG_API_PRODUCT_BASE_PATH}/auth/(session|refresh|logout)(/|$) {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        # Next.js BFF cookie routes (unprefixed alias; canonical routes also under ${RAG_API_PRODUCT_BASE_PATH}/auth/…).
        location ~ ^/api/auth/(session|refresh|logout)(/|$) {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        # Product auth on backend (OAuth start/callback/exchange, login, …); cookie BFF routes matched above.
        location ${RAG_API_PRODUCT_BASE_PATH}/auth/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location ${RAG_API_PRODUCT_BASE_PATH}/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location /actuator/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location /_next/ {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering on;
            client_max_body_size ${WEB_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        # Everything else is served by the Next.js webapp (not the Spring backend).
        # Unprefixed /api/auth/session|refresh|logout are BFF-only (see locations above); no /api/admin upstream.
        location / {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${WEB_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        location @api_gateway_error {
            default_type application/json;
            add_header Content-Type application/json always;
            add_header X-Proxy-Error "nginx-gateway" always;
            return 502 '{"success":false,"error":{"code":"API_GATEWAY_ERROR","message":"Gateway upstream unavailable"},"meta":{"source":"reverse-proxy"}}';
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        # Self-signed certificate generated at image build time
        ssl_certificate     ${TLS_CERT_PATH};
        ssl_certificate_key ${TLS_KEY_PATH};
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "${CONTENT_SECURITY_POLICY}" always;

        location ~ ^${RAG_API_PRODUCT_BASE_PATH}/auth/(session|refresh|logout)(/|$) {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        # Next.js BFF cookie routes (unprefixed alias; canonical routes also under ${RAG_API_PRODUCT_BASE_PATH}/auth/…).
        location ~ ^/api/auth/(session|refresh|logout)(/|$) {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        # Product auth on backend (OAuth start/callback/exchange, login, …); cookie BFF routes matched above.
        location ${RAG_API_PRODUCT_BASE_PATH}/auth/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location ${RAG_API_PRODUCT_BASE_PATH}/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location /actuator/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${API_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${API_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${API_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${API_PROXY_READ_TIMEOUT};
            error_page 502 503 504 = @api_gateway_error;
        }

        location /_next/ {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering on;
            client_max_body_size ${WEB_CLIENT_MAX_BODY_SIZE};
            proxy_connect_timeout ${WEB_PROXY_CONNECT_TIMEOUT};
            proxy_send_timeout    ${WEB_PROXY_SEND_TIMEOUT};
            proxy_read_timeout    ${WEB_PROXY_READ_TIMEOUT};
        }

        location / {
            proxy_pass         http://webapp_upstream;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host $host;
            proxy_set_header   X-Forwarded-Port $server_port;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_buffering off;
            client_max_body_size ${WEB_CLIENT_MAX_BODY_SIZE};
