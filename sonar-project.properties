# =============================================================================
# SonarCloud — Project configuration
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/
# =============================================================================

# Must match the SonarCloud project key (see README badges and SonarCloud → Project Information)
sonar.projectKey=sergio-tr_rag-spring-ai-ollama
sonar.organization=sergio-tr
sonar.projectName=RAG Spring AI Ollama
sonar.projectVersion=0.0.1-SNAPSHOT

# GitHub links (shown in SonarCloud project dashboard)
sonar.links.homepage=https://github.com/sergio-tr/rag-spring-ai-ollama
sonar.links.scm=https://github.com/sergio-tr/rag-spring-ai-ollama
sonar.links.ci=https://github.com/sergio-tr/rag-spring-ai-ollama/actions

# =============================================================================
# Source roots (multi-language: Java backend + Python classifier + TypeScript webapp)
# Vitest remains the source of truth for frontend coverage; LCOV is uploaded for Sonar only.
# =============================================================================
sonar.sources=rag-service/src/main/java,classifier-service/app,classifier-service/main.py,webapp/src
sonar.tests=rag-service/src/test/java,classifier-service/tests
sonar.typescript.tsconfigPath=webapp/tsconfig.json

# =============================================================================
# Java — binaries, libraries and coverage
#
# The CI workflow (sonar.yml) runs, in order:
#   1. (from rag-service) ./mvnw verify → compile + tests + JaCoCo XML report
#   2. ./mvnw dependency:copy-dependencies → copies JARs to target/dependency/
#   3. Classifier pytest → coverage.xml
#   4. (from webapp) npm install && npm run test:coverage → webapp/coverage/lcov.info
#   5. SonarCloud scan → reads the paths below
#
# sonar.java.libraries MUST point to a real directory with JARs; otherwise
# SonarCloud cannot resolve types and will produce false positives / miss issues.
# The step "Copy Maven dependencies" in sonar.yml creates target/dependency/.
# =============================================================================
sonar.java.binaries=rag-service/target/classes
sonar.java.test.binaries=rag-service/target/test-classes
sonar.java.libraries=rag-service/target/dependency
sonar.coverage.jacoco.xmlReportPaths=rag-service/target/site/jacoco/jacoco.xml

# =============================================================================
# TypeScript / JavaScript — Vitest LCOV (generated in CI before Sonar scan)
# =============================================================================
sonar.javascript.lcov.reportPaths=webapp/coverage/lcov.info

# =============================================================================
# Python — version and coverage
# The CI workflow runs pytest (with pytest.ini addopts already including --cov).
# Output: classifier-service/coverage.xml
# =============================================================================
sonar.python.version=3.11
sonar.python.coverage.reportPaths=classifier-service/coverage.xml

# =============================================================================
# Exclusions — files that must NOT be analyzed at all
#
# Important rules:
#  - sonar.exclusions applies to ALL analysis (code, secrets, duplicates).
#  - Files with hard-coded credentials (SQL init scripts) must be here, NOT
#    in sonar.issue.ignore.multicriteria, because "Hard-coded credentials"
#    (S2068) is a Security Hotspot — and Security Hotspots CANNOT be suppressed
#    via sonar.issue.ignore.multicriteria (that property only works for Issues).
#    The only way to prevent them from appearing is to exclude the file entirely.
# =============================================================================
sonar.exclusions=\
  **/target/**,\
  **/.mvn/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/venv/**,\
  observability/**,\
  docker/**,\
  reverse-proxy/**,\
  scripts/**,\
  docs/**,\
  **/Dockerfile,\
  **/Dockerfile.dev,\
  **/.env*,\
  **/*.sh,\
  **/*.yml.template,\
  db/**,\
  **/test-init.sql,\
  rag-service/src/main/resources/db/**,\
  webapp/node_modules/**,\
  webapp/.next/**,\
  webapp/coverage/**,\
  webapp/out/**,\
  webapp/src/**/*.test.ts,\
  webapp/src/**/*.test.tsx

# Do not count test files in the main coverage metric
sonar.test.exclusions=\
  rag-service/src/test/**,\
  classifier-service/tests/**

# =============================================================================
# Coverage exclusions — classes/files excluded from the coverage percentage
# (bootstrap, pure configuration bindings, pure data models, REST DTOs, JPA
# entities, and thin controllers — same rationale as existing entity rows)
#
# Keep this list aligned with rag-service/pom.xml JaCoCo <excludes> (same intent).
# ProcessQueryService / SimpleProcessQueryService are measured (covered by unit tests).
# Wave 6.03: removed global **/*Configuration.java, **/*Properties.java, **/model/**, **/exception/**,
# domain/runtime/{advisor,functioncalling,retrieval}, dead api dto globs, and interfaces/rest/dto (JaCoCo parity).
# Residual `model` / `exception` coverage gaps use explicit rag-service paths only (not application/model).
# Wave 6.04: removed 32 enumerated **/infrastructure/persistence/jpa/<Entity>.java lines (JaCoCo parity with 6.04).
# Wave 6.05: removed **/application/service/runtime/** and **/domain/runtime/engine/** (JaCoCo parity with 6.05).
# =============================================================================
sonar.coverage.exclusions=\
  **/Application.java,\
  rag-service/src/main/java/com/uniovi/rag/domain/model/**,\
  rag-service/src/main/java/com/uniovi/rag/infrastructure/model/**,\
  rag-service/src/main/java/com/uniovi/rag/domain/exception/**,\
  **/package-info.java,\
  **/domain/entity/**,\
  **/service/document/**,\
  **/application/service/knowledge/**,\
  **/service/retriever/**,\
  **/service/evaluation/**,\
  **/tool/**,\
  **/service/analyser/**,\
  **/service/extraction/**,\
  **/service/ranker/**,\
  **/application/service/evaluation/**,\
  rag-service/src/main/java/com/uniovi/rag/infrastructure/persistence/traceregressionsuitedefinition/**,\
  classifier-service/tests/**,\
  classifier-service/main.py,\
  classifier-service/app/inference/model_loader.py,\
  webapp/src/features/lab/components/lab-evaluation-run-card.tsx,\
  webapp/src/components/layout/app-subnav-section-layout.tsx

# =============================================================================
# CPD (copy-paste detection) — exclusions
# Tests and SQL migrations have acceptable, intentional repetition.
# App Router pages/layouts are often structurally similar; product behavior is
# covered by shared feature components + E2E.
# =============================================================================
sonar.cpd.exclusions=\
  rag-service/src/test/**,\
  classifier-service/tests/**,\
  webapp/src/app/**/page.tsx,\
  webapp/src/app/**/layout.tsx,\
  rag-service/src/main/java/com/uniovi/rag/service/document/ByteArrayMultipartFile.java,\
  rag-service/src/main/java/com/uniovi/rag/infrastructure/web/SimpleMultipartFile.java

# =============================================================================
# Issue suppression — sonar.issue.ignore.multicriteria
# (Add entries here only for confirmed false positives in code that cannot be excluded.)
# =============================================================================

# =============================================================================
# Encoding
# =============================================================================
sonar.sourceEncoding=UTF-8
