# =============================================================================
# CPD (copy-paste detection) - exclusions
# Tests and SQL migrations have acceptable, intentional repetition.
# App Router pages/layouts are often structurally similar; product behavior is
# covered by shared feature components + E2E.
# =============================================================================
sonar.cpd.exclusions=\
  rag-service/src/test/**,\
  classifier-service/tests/**,\
  webapp/src/app/**/page.tsx,\
  webapp/src/app/**/layout.tsx,\
  rag-service/src/main/java/com/uniovi/rag/service/document/ByteArrayMultipartFile.java,\
  rag-service/src/main/java/com/uniovi/rag/infrastructure/web/SimpleMultipartFile.java

# =============================================================================
# Issue suppression - sonar.issue.ignore.multicriteria
# (Add entries here only for confirmed false positives in code that cannot be excluded.)
# =============================================================================

# =============================================================================
# Encoding
# =============================================================================
sonar.sourceEncoding=UTF-8

# Fail CI/local Maven scan when SonarCloud quality gate does not pass (requires SONAR_TOKEN).
sonar.qualitygate.wait=true
