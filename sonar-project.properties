# Sonar-only rows (not in JaCoCo <excludes>): **/*Configuration.java,
# **/*Properties.java, domain/runtime + exception, interfaces/rest, classifier app,
# and webapp shells listed in vitest.config.mts — see docs/quality/README.md.
# =============================================================================
