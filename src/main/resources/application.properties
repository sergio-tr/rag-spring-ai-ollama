server.port=9000
spring.application.name=rag-spring-ai
spring.main.allow-bean-definition-overriding=true
spring.ai.ollama.base-url=http://156.35.95.18:11434
spring.ai.ollama.chat.model=gemma3:4b
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.model=gemma2:latest
spring.ai.ollama.embedding.model=mxbai-embed-large
spring.ai.ollama.top-k=80
# Similarity threshold for retrieval
spring.ai.ollama.similarity-threshold=0.25
# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/vectordb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# --- Logs ---
logging.level.org.springframework=INFO
logging.file.path=./logs
# --- Python classifier ---
rag.classifier.python.executable=C:\\Users\\eii\\Desktop\\SergioLLMS\\Python\\rag\\env\\Scripts\\activate.bat
rag.classifier.python.script=C:\\Users\\eii\\Desktop\\SergioLLMS\\Python\\classifier\\classify_question.py
# --- Evaluation: clear DB before loading when evaluating with default config (ensures BD matches current config) ---
evaluation.clean-before-load=true
# --- Chunk size for document splitting (embedding model limit; mxbai-embed-large supports ~512 tokens) ---
rag.chunk.max-chars=400
# --- Query expansion ---
rag.expansion.strategy=COT
rag.expansion.original-repeat=1
rag.expansion.max-expansion-chars=350
rag.expansion.max-query-total-chars=512
rag.expansion.max-query-length-for-llm=500
rag.expansion.retry-query-length=200
# --- NER query enrichment
rag.ner.enrichment.max-extra-chars=80
rag.ner.enrichment.max-total-chars=512
# --- RAG System Features Flags ---
rag.features.expansion-enabled=false
rag.features.tools-enabled=false
rag.features.ner-enabled=false
rag.features.metadata-enabled=false
rag.features.reasoning-enabled=false
rag.features.ranker-enabled=false
rag.features.post-retrieval-enabled=false
rag.features.tool-rag-enabled=false
rag.features.use-retrieval=true
rag.features.use-advisor=true
rag.post-retrieval.top-k=10
rag.tool-rag.top-k=5
# --- Reasoning (when rag.features.reasoning-enabled=true) ---
rag.reasoning.strategy=SIMPLE
rag.reasoning.max-steps=3
rag.reasoning.max-tokens-per-step=512
# --- Ranker (when rag.features.ranker-enabled=true) ---
rag.ranker.strategy=LLM_AS_JUDGE
rag.ranker.candidates-count=3
rag.ranker.max-candidates=10
rag.ranker.always-run=false
# --- Implementation selection ---
rag.query-service-impl=process
rag.retriever-impl=basic
rag.analyser-impl=minute-ner