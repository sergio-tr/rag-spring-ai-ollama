server.port=9000
spring.application.name=rag-spring-ai
spring.main.allow-bean-definition-overriding=true
spring.ai.ollama.base-url=http://156.35.95.18:11434
spring.ai.ollama.chat.model=gemma3:4b
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.model=gemma2:latest
spring.ai.ollama.embedding.model=mxbai-embed-large
spring.ai.ollama.top-k=80
# Similarity threshold for retrieval
spring.ai.ollama.similarity-threshold=0.25
# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/vectordb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# --- Logs ---
logging.level.org.springframework=INFO
logging.file.path=./logs
# --- Python classifier ---
rag.classifier.python.executable=C:\\Users\\eii\\Desktop\\SergioLLMS\\Python\\rag\\env\\Scripts\\activate.bat
rag.classifier.python.script=C:\\Users\\eii\\Desktop\\SergioLLMS\\Python\\classifier\\classify_question.py
# --- Evaluation: clear DB before loading when evaluating with default config (ensures BD matches current config) ---
evaluation.clean-before-load=true
# --- Chunk size for document splitting (embedding model limit; mxbai-embed-large supports ~512 tokens) ---
rag.chunk.max-chars=400
# --- RAG System Features Flags ---
rag.features.expansion-enabled=false
rag.features.tools-enabled=false
rag.features.ner-enabled=false
rag.features.metadata-enabled=false