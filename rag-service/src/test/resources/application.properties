# Test override: keep API paths stable for MockMvc assertions (match main defaults).
rag.api.product-base-path=/api/v5

# Actuator OTLP: avoid bootstrap failures when the environment sets relative OTLP URLs (SafeTestSecrets fixes some cases).
management.otlp.tracing.endpoint=http://127.0.0.1:4318/v1/traces
management.otlp.metrics.export.url=http://127.0.0.1:4318/v1/metrics

# Dense retrieval unit slices: allow fallback store when tests omit snapshot embedding id.
rag.vector.require-snapshot-embedding-model-id=false
