# Test profile: no outbound calls to Ollama/OTLP (see TestAiStubConfiguration for AI stubs).
# Spring AI flat keys (retriever / evaluation beans use @Value). Keep in sync with application.properties —
# some CI/binder setups did not expose these to the Environment for profile "test".
spring.ai.ollama.base-url=http://127.0.0.1:1
spring.ai.ollama.chat.model=gemma3:4b
spring.ai.ollama.embedding.model=mxbai-embed-large
spring.ai.ollama.top-k=80
spring.ai.ollama.similarity-threshold=0.25
# JDBC: SafeTestSecretsApplicationContextInitializer (spring.factories + ApplicationContextInitializer.imports)
# sets spring.datasource.* with highest precedence (GitHub service Postgres vs Testcontainers).
# Literals below match CI postgres on localhost:5432 when env placeholders resolve empty.
# TestcontainersDatasourceConfiguration is an empty @Import marker only (see testsupport package).
spring.datasource.url=jdbc:postgresql://localhost:5432/vectordb
spring.datasource.username=postgres
spring.datasource.password=postgres

# Spring tests: some slice tests provide overlapping @TestConfiguration beans on the classpath.
# Keep overriding enabled so unrelated @SpringBootTest contexts (e.g. OpenAPI export) can still start.
spring.main.allow-bean-definition-overriding=true

# JWT for security tests and sliced @WebMvcTest (>= 32 chars)
rag.jwt.secret=${RAG_JWT_SECRET_TEST:test-secret-key-for-jwt-signing-must-be-long-enough-32}

# Flyway: force migrations into public schema in tests (avoid search_path differences across CI runners)
spring.flyway.schemas=public
spring.flyway.default-schema=public

# Auth/account defaults for tests (disabled unless a test enables them explicitly)
rag.auth.mail.enabled=false
rag.auth.mail.from=no-reply@local.test
rag.auth.webapp-base-url=http://localhost:3000
rag.auth.backend-base-url=http://localhost:9000
rag.auth.email-confirmation.enabled=false
rag.auth.email-confirmation.token-ttl-seconds=3600
rag.auth.password-reset.enabled=false
rag.auth.password-reset.token-ttl-seconds=3600
rag.auth.oauth.enabled=false
rag.auth.oauth.google.client-id=
rag.auth.oauth.google.client-secret=
rag.auth.oauth.google.issuer=https://accounts.google.com
rag.auth.oauth.google.redirect-path=/api/auth/oauth/google/callback
spring.test.context.cache.maxSize=64

# Improve test ApplicationContext resilience (avoid cascading failures in large suites)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.defer-datasource-initialization=true
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5
# Actuator: do not call real Ollama/classifier during unit tests (health returns UP with "skipped").
rag.health.ollama-enabled=false
rag.health.classifier-enabled=false
# Outbound classifier HTTP: empty URL makes ClassifierServiceClient a no-op (null classify) unless a test overrides.
rag.classifier.service.url=
rag.ollama.auto-pull-enabled=false

# Disable OTLP push during unit/integration tests (avoids connection noise to localhost:4318).
management.otlp.metrics.export.enabled=false
management.otlp.tracing.export.enabled=false
management.metrics.export.otlp.enabled=false
# Micrometer OTel bridge still starts SDK worker threads; turn tracing off for tests to avoid Tomcat
# classloader leak warnings when a context fails mid-startup (CI logs noise).
management.tracing.enabled=false
# If CI sets OTEL_EXPORTER_OTLP_ENDPOINT="" (empty string), application.properties still treats it as set and
# builds invalid URLs like "/v1/traces". Pin harmless endpoints while export remains disabled above.
management.otlp.tracing.endpoint=http://127.0.0.1:4318/v1/traces
management.otlp.metrics.export.url=http://127.0.0.1:4318/v1/metrics

# Diagnostics: make CI show the real first ApplicationContext failure root cause
debug=true
logging.level.org.springframework.boot.diagnostics=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
