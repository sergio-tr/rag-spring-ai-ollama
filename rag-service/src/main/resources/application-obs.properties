# Active with profile "obs" (compose.obs.yml sets SPRING_PROFILES_ACTIVE=docker,obs).
# Re-enables OTLP export toward the collector; OTEL_EXPORTER_OTLP_ENDPOINT is set by Compose (not localhost).
management.otlp.tracing.export.enabled=true
management.otlp.metrics.export.enabled=true
management.metrics.export.otlp.enabled=true
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/metrics
