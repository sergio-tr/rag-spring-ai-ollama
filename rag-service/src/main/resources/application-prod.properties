# Production profile: tighten actuator, disable OpenAPI UI, require strong JWT (see ProductionSecurityValidator).

spring.config.activate.on-profile=prod

# CORS: set RAG_CORS_ALLOWED_ORIGINS to comma-separated real browser origins in public deployments
# (see rag.cors.allowed-origins in application.properties).

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never

# Disable API discovery UIs in production (keep health/metrics for ops).
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Public legacy /api/v4-style endpoints (document upload, lab tooling) stay off in production.
rag.api.legacy-controllers-enabled=false
