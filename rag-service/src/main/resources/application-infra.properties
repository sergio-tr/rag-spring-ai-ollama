# =============================================================================
# Infrastructure / environment (Docker, OTLP, actuator probes).
# Imported from application.properties. Activate with:
#   - docker          → packaged backend in container without collector (no OTLP push)
#   - docker,infra    → with compose.obs.yml (OTLP → collector)
#   - dev,infra       → backend-dev + observability stack
# =============================================================================

# --- Profile: infra (OTLP export on + container-friendly health; combine with docker or dev) ---
---
spring.config.activate.on-profile=infra
management.otlp.tracing.export.enabled=true
management.otlp.metrics.export.enabled=true
management.metrics.export.otlp.enabled=true
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/traces
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318}/v1/metrics
rag.health.classifier-require-model-loaded=false
rag.health.ollama-verify-models=true
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
