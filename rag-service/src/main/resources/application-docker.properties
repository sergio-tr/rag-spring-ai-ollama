# --- Profile: docker (packaged backend in container) ---
---
spring.config.activate.on-profile=docker
# Demo_Best preset expects metadata-backed tools (count, duration, boolean, get-field).
rag.features.metadata-enabled=true
rag.features.tools-enabled=true
# Container-local default for demos; set RAG_JWT_SECRET in real deployments.
rag.jwt.secret=${RAG_JWT_SECRET:docker-default-jwt-hs256-signing-key-32-chars-ok}
# Demo-friendly session length for long Lab evaluations.
rag.jwt.access-ttl-seconds=${RAG_JWT_ACCESS_TTL_SECONDS:14400}
rag.jwt.refresh-ttl-seconds=${RAG_JWT_REFRESH_TTL_SECONDS:604800}
# Kubernetes-style liveness/readiness for Docker healthcheck and Playwright preflight via reverse-proxy.
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
# Persistent document binaries (Docker volume mount at /var/lib/rag/storage).
rag.storage.root=${RAG_STORAGE_ROOT:/var/lib/rag/storage}
# LiteLLM-only Docker stacks: skip direct Ollama catalog probes (backend uses OPENAI_COMPATIBLE).
rag.health.ollama-verify-models=${RAG_HEALTH_OLLAMA_VERIFY_MODELS:false}
