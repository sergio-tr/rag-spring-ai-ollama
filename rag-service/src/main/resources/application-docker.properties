# Active when running the packaged app inside Docker (see docker-compose.yml: SPRING_PROFILES_ACTIVE=docker).
# Without this, OTLP defaults in application.properties point at localhost:4318 — inside the container that is
# the JVM itself, not the otel-collector, so trace/metric export fails and logs fill with connection errors.
management.otlp.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false
management.metrics.export.otlp.enabled=false
# Docker dev: allow readiness even if the default classifier model failed to load (e.g. corrupt bind-mount).
# Ollama: the chat/embedding models are downloaded automatically (rag.ollama.auto-pull-enabled) and the readiness requires them.
rag.health.classifier-require-model-loaded=false
rag.health.ollama-verify-models=true
# Easier debugging of readiness in containers (restrict in hardened prod).
management.endpoint.health.show-details=always
# Docker healthcheck: use /actuator/health/liveness (no readiness) — the readiness waits for Ollama models (long pull).
management.endpoint.health.probes.enabled=true
