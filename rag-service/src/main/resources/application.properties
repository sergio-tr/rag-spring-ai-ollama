# =============================================================================
# Application defaults (RAG, AI, features, DB). Profile "dev" adds DevTools / logs / CORS / JPA.
# Infra (Docker, OTLP, probes): optional import application-infra.properties — profiles docker | infra.
# Tests: application-test.properties (profile test).
# =============================================================================

spring.config.import=optional:classpath:application-infra.properties

server.port=${SERVER_PORT:9000}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}
spring.application.name=rag-spring-ai
spring.main.allow-bean-definition-overriding=true

# Language
spring.web.locale=en
spring.web.locale-resolver=fixed

# PostgreSQL — same as db/; in Compose use SPRING_DATASOURCE_* from db/.env (host postgres:5432)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vectordb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS for Next.js (and other dev UIs) calling /api/** on a different origin
# Dev-friendly patterns (any port on localhost / loopback). Narrow in staging/production via env.
rag.cors.allowed-origins=${RAG_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*}

# API path prefixes (override in staging/prod if you version the URL)
rag.api.product-base-path=${RAG_API_PRODUCT_BASE_PATH:/api/v5}

# Multipart limits must stay aligned with reverse-proxy API body limits.
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

# Account export ZIP (temporary files; purged after TTL)
rag.account.export-storage-dir=${RAG_ACCOUNT_EXPORT_STORAGE_DIR:${java.io.tmpdir}/rag-account-export}
rag.account.export-ttl-hours=${RAG_ACCOUNT_EXPORT_TTL_HOURS:24}
rag.account.cleanup-interval-ms=${RAG_ACCOUNT_CLEANUP_INTERVAL_MS:3600000}

# Binary storage and knowledge pipeline flags (prod defaults: off)
rag.storage.root=${RAG_STORAGE_ROOT:}
knowledge.v2.pipeline.enabled=${KNOWLEDGE_V2_PIPELINE_ENABLED:false}
knowledge.v2.chat-overlay.enabled=${KNOWLEDGE_V2_CHAT_OVERLAY_ENABLED:false}
# Knowledge System Core: DOCUMENT_LEVEL | CHUNK_LEVEL | HYBRID | STRUCTURED_SEARCH
rag.knowledge.materialization-strategy=${RAG_KNOWLEDGE_MATERIALIZATION_STRATEGY:CHUNK_LEVEL}

# JWT (HS256; must be >= 32 chars). Set RAG_JWT_SECRET, or use profile "dev" / "docker" (non-prod defaults in application-*.properties).
rag.jwt.secret=${RAG_JWT_SECRET:}
# Default 1h access token; refresh stays long-lived — avoids nuisance relogin during active dev/UI sessions (override via env).
rag.jwt.access-ttl-seconds=${RAG_JWT_ACCESS_TTL_SECONDS:3600}
rag.jwt.refresh-ttl-seconds=${RAG_JWT_REFRESH_TTL_SECONDS:604800}

# --- Auth/account flows (email confirmation, reset, OAuth) ---
# Email sending and provider integration are intentionally environment-driven; defaults are safe/no-op.
rag.auth.mail.enabled=${RAG_AUTH_MAIL_ENABLED:true}
rag.auth.mail.from=${RAG_AUTH_MAIL_FROM:no-reply@local.test}
rag.auth.mail.from-name=${RAG_AUTH_MAIL_FROM_NAME:RAG App}
rag.auth.mail.delivery-mode=${RAG_AUTH_MAIL_DELIVERY_MODE:auto}
rag.auth.mail.delivery-interval-ms=${RAG_AUTH_MAIL_DELIVERY_INTERVAL_MS:15000}
rag.auth.mail.delivery-initial-delay-ms=${RAG_AUTH_MAIL_DELIVERY_INITIAL_DELAY_MS:5000}

# Absolute webapp base URL used to generate email links (no trailing slash).
rag.auth.webapp-base-url=${RAG_AUTH_WEBAPP_BASE_URL:http://localhost}
rag.auth.backend-base-url=${RAG_AUTH_BACKEND_BASE_URL:http://localhost:9000}
rag.auth.default-locale=${RAG_AUTH_DEFAULT_LOCALE:en}

rag.auth.email-confirmation.enabled=${RAG_AUTH_EMAIL_CONFIRMATION_ENABLED:true}
rag.auth.email-confirmation.token-ttl-seconds=${RAG_AUTH_EMAIL_CONFIRMATION_TOKEN_TTL_SECONDS:3600}

rag.auth.password-reset.enabled=${RAG_AUTH_PASSWORD_RESET_ENABLED:false}
rag.auth.password-reset.token-ttl-seconds=${RAG_AUTH_PASSWORD_RESET_TOKEN_TTL_SECONDS:3600}
rag.auth.legal.required=${RAG_AUTH_LEGAL_REQUIRED:false}
rag.auth.legal.privacy-policy-version=${RAG_AUTH_LEGAL_PRIVACY_POLICY_VERSION:}
rag.auth.legal.terms-version=${RAG_AUTH_LEGAL_TERMS_VERSION:}

# OAuth/OIDC: provider configuration is required when enabling OAuth login.
rag.auth.oauth.enabled=${RAG_AUTH_OAUTH_ENABLED:false}
rag.auth.oauth.google.client-id=${RAG_AUTH_OAUTH_GOOGLE_CLIENT_ID:${GOOGLE_OAUTH_CLIENT_ID:}}
rag.auth.oauth.google.client-secret=${RAG_AUTH_OAUTH_GOOGLE_CLIENT_SECRET:${GOOGLE_OAUTH_CLIENT_SECRET:}}
rag.auth.oauth.google.issuer=${RAG_AUTH_OAUTH_GOOGLE_ISSUER:https://accounts.google.com}
# Defaults to /api/v5/auth/oauth/google/callback when rag.api.product-base-path=/api/v5 (Google Console redirect URI).
rag.auth.oauth.google.redirect-path=${RAG_AUTH_OAUTH_GOOGLE_REDIRECT_PATH:${rag.api.product-base-path}/auth/oauth/google/callback}
# Account picker on each OAuth start (app logout does not log the user out of Google).
rag.auth.oauth.google.prompt-select-account=${RAG_AUTH_OAUTH_GOOGLE_PROMPT_SELECT_ACCOUNT:true}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Spring AI / Ollama ---
spring.ai.ollama.base-url=${SPRING_AI_OLLAMA_BASE_URL:${OLLAMA_BASE_URL:http://localhost:11434}}
spring.ai.ollama.chat.model=${SPRING_AI_OLLAMA_CHAT_MODEL:gemma3:4b}
spring.ai.ollama.embedding.model=${SPRING_AI_OLLAMA_EMBEDDING_MODEL:mxbai-embed-large:latest}
spring.ai.ollama.top-k=80
spring.ai.ollama.similarity-threshold=0.25

# --- LLM providers (application defaults; runtime vector store wiring is provider-aware in later phases) ---
# Active provider: OLLAMA_NATIVE | OPENAI_COMPATIBLE
rag.llm.default-provider=${RAG_LLM_DEFAULT_PROVIDER:OLLAMA_NATIVE}
rag.llm.default-chat-provider=${RAG_LLM_DEFAULT_CHAT_PROVIDER:}
rag.llm.default-embedding-provider=${RAG_LLM_DEFAULT_EMBEDDING_PROVIDER:}
# Ollama-native defaults — fall back to legacy spring.ai.ollama.* for backward compatibility
rag.llm.ollama.default-base-url=${RAG_LLM_OLLAMA_DEFAULT_BASE_URL:${spring.ai.ollama.base-url}}
rag.llm.ollama.default-chat-model=${RAG_LLM_OLLAMA_DEFAULT_CHAT_MODEL:${spring.ai.ollama.chat.model}}
rag.llm.ollama.default-embedding-model=${RAG_LLM_OLLAMA_DEFAULT_EMBEDDING_MODEL:${spring.ai.ollama.embedding.model}}
rag.llm.ollama.default-timeout-ms=${RAG_LLM_OLLAMA_DEFAULT_TIMEOUT_MS:60000}
rag.llm.ollama.default-temperature=${RAG_LLM_OLLAMA_DEFAULT_TEMPERATURE:0.1}
rag.llm.ollama.available-chat-models=${RAG_LLM_OLLAMA_AVAILABLE_CHAT_MODELS:qwen3.6:27b,deepseek-v2:16b,qwen3-vl:8b,gpt-oss:20b,qwen3.5:9b,qwen3-vl:30b,llama3.2:1b,llama3.2:latest,deepseek-coder:6.7b,deepseek-r1:7b,deepseek-r1:14b,glm-ocr:latest,gemma4:12b,qwen2.5-coder:1.5b,codegemma:7b,qwen2.5-coder:7b,qwen2.5-coder:14b,qwen3.5:27b,gemma3:27b,deepseek-coder:1.3b,llama3.2:3b,qwen3.5:2b,qwen3.5:4b,qwen2.5:7b,qwen3:8b,qwen2.5-coder:3b,codegemma:2b,qwen2.5-coder:0.5b,llama3.1:8b,codellama:7b,codellama:13b,gemma4:e4b,gemma4:31b,qwen3.6:35b,codellama:13b-instruct,gemma4:26b,ministral-3:14b}

rag.llm.ollama.available-embedding-models=${RAG_LLM_OLLAMA_AVAILABLE_EMBEDDING_MODELS:hf.co/mixedbread-ai/mxbai-embed-large-v1:latest}

# OpenAI-compatible / LiteLLM (POST /v1/chat/completions). API key is read from env name only — never set secrets here.
rag.llm.openai-compatible.default-base-url=${LITELLM_BASE_URL:}
rag.llm.openai-compatible.default-api-key-env=${LITELLM_API_KEY_ENV:OPENAI_COMPATIBLE_API_KEY}
rag.llm.openai-compatible.default-chat-model=${LITELLM_CHAT_MODEL:}
rag.llm.openai-compatible.default-embedding-model=${LITELLM_EMBEDDING_MODEL:}
rag.llm.openai-compatible.default-timeout-ms=${LITELLM_DEFAULT_TIMEOUT_MS:60000}
rag.llm.openai-compatible.default-temperature=${LITELLM_DEFAULT_TEMPERATURE:0.1}

rag.llm.openai-compatible.available-chat-models=${LITELLM_AVAILABLE_CHAT_MODELS:qwen3.6:27b,deepseek-v2:16b,qwen3-vl:8b,gpt-oss:20b,qwen3.5:9b,qwen3-vl:30b,llama3.2:1b,llama3.2:latest,deepseek-coder:6.7b,deepseek-r1:7b,deepseek-r1:14b,glm-ocr:latest,gemma4:12b,qwen2.5-coder:1.5b,codegemma:7b,qwen2.5-coder:7b,qwen2.5-coder:14b,qwen3.5:27b,gemma3:27b,deepseek-coder:1.3b,llama3.2:3b,qwen3.5:2b,qwen3.5:4b,qwen2.5:7b,qwen3:8b,qwen2.5-coder:3b,codegemma:2b,qwen2.5-coder:0.5b,llama3.1:8b,codellama:7b,codellama:13b,gemma4:e4b,gemma4:31b,qwen3.6:35b,codellama:13b-instruct,gemma4:26b,ministral-3:14b}

rag.llm.openai-compatible.available-embedding-models=${LITELLM_AVAILABLE_EMBEDDING_MODELS:hf.co/mixedbread-ai/mxbai-embed-large-v1:latest}

# --- Actuator (base exposure; profile "dev" widens for debugging) ---
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.group.readiness.include=db,ragProvider,classifier
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0

# --- OTLP: off by default; profile "infra" enables export (application-infra.properties) ---
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
management.otlp.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false
management.metrics.export.otlp.enabled=false

# --- RAG health checks (Actuator) ---
rag.health.ollama-enabled=true
rag.health.classifier-enabled=true
rag.health.ollama-verify-models=true
rag.health.classifier-require-model-loaded=true
rag.health.connect-timeout-ms=3000
rag.health.read-timeout-ms=3000

# --- Ollama model pull ---
rag.ollama.auto-pull-enabled=true
rag.ollama.pull-read-timeout-ms=1800000

# --- Logs ---
logging.level.org.springframework=INFO
logging.file.name=./logs/spring.log
logging.logback.rollingpolicy.file-name-pattern=./logs/spring-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30

# --- Query classifier (HTTP API to classifier-service) ---
rag.classifier.service.url=${RAG_CLASSIFIER_SERVICE_URL:http://localhost:8000}
rag.classifier.service.timeout-ms=${RAG_CLASSIFIER_SERVICE_TIMEOUT_MS:5000}
# Default /classify tag when RAG config omits classifierModelId; must match classifier-service built-in id for registry sync.
rag.classifier.model-id=${RAG_CLASSIFIER_MODEL_ID:default}
rag.classifier.confidence-threshold=${RAG_CLASSIFIER_CONFIDENCE_THRESHOLD:0.55}

# --- Evaluation ---
evaluation.clean-before-load=false
# Persist evaluation_run / evaluation_result from Lab async handlers (disable for disabled Lab persistence)
rag.evaluation.persistence.enabled=${RAG_EVALUATION_PERSISTENCE_ENABLED:true}
# Dataset binaries for evaluation (defaults under java.io.tmpdir/rag-evaluation-datasets if empty)
rag.evaluation.storage-root=${RAG_EVALUATION_STORAGE_ROOT:}
rag.evaluation.max-upload-bytes=${RAG_EVALUATION_MAX_UPLOAD_BYTES:26214400}
# Optional override for batch upload URL used by evaluation helpers (default: http://localhost:{server.port}).
rag.evaluation.http-base-url=${RAG_EVALUATION_HTTP_BASE_URL:}
# Optional reproducibility metadata for Lab export v1 (Wave 2)
rag.evaluation.provenance.git-sha=${RAG_EVALUATION_GIT_SHA:${GIT_SHA:}}
rag.evaluation.provenance.build-id=${RAG_EVALUATION_BUILD_ID:${BUILD_ID:}}
rag.evaluation.provenance.environment-label=${RAG_ENVIRONMENT:${ENVIRONMENT:}}

# --- Chunking (embedding model limits; mxbai-embed-large ~512 tokens) ---
rag.chunk.max-chars=400

# --- Indexing embedding safety (never exceed Ollama embedder context) ---
rag.indexing.embedding.max-input-chars=${RAG_INDEXING_EMBEDDING_MAX_INPUT_CHARS:2048}
rag.indexing.embedding.max-chunk-chars=${RAG_INDEXING_EMBEDDING_MAX_CHUNK_CHARS:400}
rag.indexing.embedding.retry-on-context-length=${RAG_INDEXING_EMBEDDING_RETRY_ON_CONTEXT_LENGTH:true}
rag.indexing.embedding.context-length-safety-ratio=${RAG_INDEXING_EMBEDDING_CONTEXT_LENGTH_SAFETY_RATIO:0.85}

# --- Query expansion ---
rag.expansion.strategy=COT
rag.expansion.original-repeat=1
rag.expansion.max-expansion-chars=350
rag.expansion.max-query-total-chars=512
rag.expansion.max-query-length-for-llm=500
rag.expansion.retry-query-length=200

# --- NER query enrichment ---
rag.ner.enrichment.max-extra-chars=80
rag.ner.enrichment.max-total-chars=512

# --- Feature flags ---
# ResolvedRuntimeConfig path in chat (aligns with /config/preview); default off for safe rollout.
rag.config.v2.enabled=${RAG_CONFIG_V2_ENABLED:false}

# RAG runtime: workflow semver, memory caps, optional advisor switch
rag.runtime.advisor-with-post-retrieval=false
rag.runtime.workflow-schema-version=1.0.0
rag.runtime.memory-max-turns=20
rag.runtime.memory-max-chars=8000

# --- Prompt context budgets (chars) ---
rag.runtime.context.max-prompt-chars=24000
rag.runtime.context.full-corpus-max-chars=20000
rag.runtime.context.stateless-context-max-chars=12000
rag.runtime.context.combined-document-max-chars=12000
rag.runtime.context.judge-max-answer-chars=4000

rag.features.expansion-enabled=false
rag.features.tools-enabled=false
rag.features.function-calling-enabled=false
rag.features.ner-enabled=false
rag.features.metadata-enabled=false
rag.features.reasoning-enabled=false
rag.features.ranker-enabled=false
rag.features.post-retrieval-enabled=false
rag.features.use-retrieval=true
rag.features.use-advisor=true
rag.features.adaptive-routing-enabled=false
rag.features.judge-enabled=false
rag.post-retrieval.top-k=10

# --- Reasoning ---
rag.reasoning.strategy=SIMPLE
rag.reasoning.max-steps=3
rag.reasoning.max-tokens-per-step=512

# --- Ranker ---
rag.ranker.strategy=LLM_AS_JUDGE
rag.ranker.candidates-count=3
rag.ranker.max-candidates=10
rag.ranker.always-run=false

# --- Implementation selection ---
rag.query-service-impl=process
rag.retriever-impl=basic
rag.analyser-impl=minute-ner

# --- OpenAPI / Swagger UI (springdoc-openapi) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JSON API errors: throw 404 as exception so controllers/advice can format a consistent JSON body.
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false