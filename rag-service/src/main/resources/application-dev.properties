# Development profile — active with: -Dspring.profiles.active=dev
# Loaded on top of application.properties; overrides only what differs in dev.

# --- OTLP: no collector on localhost, exporting to :4318 fills the error log ---
# To send traces/metrics to the collector: SPRING_PROFILES_ACTIVE=dev,obs (see application-obs.properties).
management.otlp.tracing.export.enabled=false
management.otlp.metrics.export.enabled=false
management.metrics.export.otlp.enabled=false

# --- Kubernetes-style probes: /actuator/health/liveness (JVM up) vs /readiness (DB+Ollama+classifier) ---
# The readiness may be 503 for several minutes while Ollama is pulling models; the Docker healthcheck must use liveness.
management.endpoint.health.probes.enabled=true

# --- Schema management: allow Hibernate to evolve schema in dev ---
spring.jpa.hibernate.ddl-auto=update

# --- Actuator: expose all endpoints in dev for easier debugging ---
management.endpoints.web.exposure.include=health,prometheus,info,env,beans,loggers,mappings,conditions
management.endpoint.health.show-details=always

# --- Logging: verbose for dev ---
logging.level.com.uniovi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.ai=DEBUG
# Reduce noise from Spring Security (if/when added)
logging.level.org.springframework.security=INFO

# --- CORS: open for local frontend development (Next.js on :3000) ---
rag.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# --- Spring DevTools: fast restart on classpath changes (~1-2s) ---
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms

# --- Evaluation: do NOT clean DB before evaluation in dev (preserve test data) ---
evaluation.clean-before-load=false
