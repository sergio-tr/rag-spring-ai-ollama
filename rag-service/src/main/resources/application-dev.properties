# --- Profile: dev (DevTools, verbose logging, CORS, JPA update) ---
---
spring.config.activate.on-profile=dev
# Local-only signing key; override with RAG_JWT_SECRET in shared or production-like environments.
rag.jwt.secret=${RAG_JWT_SECRET:local-dev-jwt-hs256-signing-key-min-32-chars-ok}
management.endpoint.health.probes.enabled=true
spring.jpa.hibernate.ddl-auto=update
management.endpoints.web.exposure.include=health,prometheus,info,env,beans,loggers,mappings,conditions
management.endpoint.health.show-details=always
logging.level.com.uniovi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.security=INFO
# Include common Docker webapp host ports (WEBAPP_HTTP_PORT=8081) when NEXT_PUBLIC_API_BASE_URL points at Spring (cross-origin fetch).
rag.cors.allowed-origins=http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8081,http://127.0.0.1:8081
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.poll-interval=1s
spring.devtools.restart.quiet-period=400ms

# Dev-only escape hatch: some config beans currently form a cycle.
spring.main.allow-circular-references=true

# Longer access tokens for local Lab evaluations (override via RAG_JWT_ACCESS_TTL_SECONDS).
rag.jwt.access-ttl-seconds=${RAG_JWT_ACCESS_TTL_SECONDS:14400}
rag.jwt.refresh-ttl-seconds=${RAG_JWT_REFRESH_TTL_SECONDS:604800}

# M2 product auth: email confirmation + outbox for local demo (override via RAG_AUTH_* env).
rag.auth.email-confirmation.enabled=${RAG_AUTH_EMAIL_CONFIRMATION_ENABLED:true}
rag.auth.mail.enabled=${RAG_AUTH_MAIL_ENABLED:true}
# Local dev without SPRING_MAIL_HOST: auto resolves to outbox-only (explicit, not silent skip).
rag.auth.mail.delivery-mode=${RAG_AUTH_MAIL_DELIVERY_MODE:auto}

# Knowledge v2 defaults for local development
knowledge.v2.pipeline.enabled=true
knowledge.v2.chat-overlay.enabled=true