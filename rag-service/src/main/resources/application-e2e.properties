# Loaded when spring.profiles.active includes "e2e" (Playwright / CI: Postgres + deterministic AI stubs, no real Ollama).
# See RagE2eAiStubConfiguration. Do not use in production.
#
# Plain password for the seeded ADMIN user (E2eAdminUserSeeder). CI and Playwright use "e2e"; override only for local experiments.
rag.e2e.admin-password=e2e
rag.health.ollama-enabled=false
rag.health.classifier-enabled=false
# Skip HTTP classifier calls (no Python service in e2e job).
rag.classifier.service.url=
rag.classifier.service.timeout-ms=500
