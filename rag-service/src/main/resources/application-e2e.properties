# Loaded when spring.profiles.active includes "e2e" (Playwright / CI: Postgres + deterministic AI stubs, no real Ollama).
# See RagE2eAiStubConfiguration. Do not use in production.
#
# Plain password for the seeded ADMIN user (E2eAdminUserSeeder). CI and Playwright use "e2e"; override only for local experiments.
rag.e2e.admin-password=e2e
rag.health.ollama-enabled=false
rag.health.classifier-enabled=false
# If CI/org env forces rag.health.ollama-enabled=true, skip pulls so the provisioning gate does not block /api without Ollama.
rag.ollama.auto-pull-enabled=false
# Skip HTTP classifier calls (no Python service in e2e job).
rag.classifier.service.url=
rag.classifier.service.timeout-ms=500

# Deterministic LLM stack for CI/Playwright (no LiteLLM/Ollama HTTP). RagE2eAiStubConfiguration supplies in-memory clients.
rag.llm.default-provider=OLLAMA_NATIVE
rag.llm.ollama.default-embedding-model=bge-m3
spring.ai.ollama.embedding.model=bge-m3

# Local-only JWT signing key for e2e profile; override via RAG_JWT_SECRET if desired.
rag.jwt.secret=${RAG_JWT_SECRET:e2e-jwt-hs256-signing-key-min-32-chars-ok}

# Fullstack Playwright: direct webapp (:3000) and HTTPS reverse-proxy (:8443) in CI-like runs.
rag.cors.allowed-origins=${RAG_CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000,http://localhost:3000,https://127.0.0.1:8443,https://localhost:8443}

# Enable account lifecycle flows in E2E so Playwright can validate them via outbox inspection.
rag.auth.mail.enabled=true
rag.auth.mail.delivery-mode=outbox-only
rag.auth.email-confirmation.enabled=true
rag.auth.password-reset.enabled=true

# Kubernetes-style liveness/readiness (Playwright preflight + CI fullstack on :9000).
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.group.readiness.show-details=always

# OAuth start must redirect to Google when enabled (API proxy routing + auth-routing.api.spec).
# Stub client credentials - no real token exchange in e2e; satisfies googleStartUrl() guardrails.
rag.auth.oauth.enabled=true
rag.auth.oauth.google.client-id=e2e-ci-stub-google-client-id
rag.auth.oauth.google.client-secret=e2e-ci-stub-google-secret
rag.auth.backend-base-url=${RAG_AUTH_BACKEND_BASE_URL:http://127.0.0.1:9000}
