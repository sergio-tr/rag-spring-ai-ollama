# Loaded when spring.profiles.active includes "e2e" (Playwright / CI: Postgres + deterministic AI stubs, no real Ollama).
# See RagE2eAiStubConfiguration. Do not use in production.
#
# Plain password for the seeded ADMIN user (E2eAdminUserSeeder). CI and Playwright use "e2e"; override only for local experiments.
rag.e2e.admin-password=e2e
rag.health.ollama-enabled=false
rag.health.classifier-enabled=false
# Skip HTTP classifier calls (no Python service in e2e job).
rag.classifier.service.url=
rag.classifier.service.timeout-ms=500

# Local-only JWT signing key for e2e profile; override via RAG_JWT_SECRET if desired.
rag.jwt.secret=${RAG_JWT_SECRET:e2e-jwt-hs256-signing-key-min-32-chars-ok}

# Fullstack Playwright uses http://127.0.0.1:3000; local dev often uses http://localhost:3000.
rag.cors.allowed-origins=http://127.0.0.1:3000,http://localhost:3000

# Enable account lifecycle flows in E2E so Playwright can validate them via outbox inspection.
rag.auth.mail.enabled=true
rag.auth.email-confirmation.enabled=true
rag.auth.password-reset.enabled=true
