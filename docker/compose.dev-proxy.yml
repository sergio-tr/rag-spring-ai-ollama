# Optional dev entrypoint: nginx routes / -> webapp, /api/* and /actuator/* -> backend-dev.
# Enable with ./docker/scripts/docker-compose.sh up dev --rag --proxy (adds --profile proxy).

services:
  reverse-proxy:
    profiles:
      - proxy
    build:
      context: ../reverse-proxy
      dockerfile: Dockerfile
    depends_on:
      backend-dev:
        condition: service_started
      webapp:
        condition: service_started
    ports:
      - "${REVERSE_PROXY_DEV_HTTP_PORT:-8080}:80"
      - "${REVERSE_PROXY_DEV_HTTPS_PORT:-8444}:443"
    volumes:
      - reverse_proxy_certs:/etc/nginx/certs
    environment:
      BACKEND_HOST: backend-dev
      BACKEND_INTERNAL_PORT: ${SERVER_PORT:-9000}
      WEBAPP_HOST: webapp
      WEBAPP_INTERNAL_PORT: ${WEBAPP_CONTAINER_PORT:-3000}
      REVERSE_PROXY_SERVER_NAME: ${REVERSE_PROXY_SERVER_NAME:-localhost}
      REVERSE_PROXY_ENFORCE_HTTPS: ${REVERSE_PROXY_ENFORCE_HTTPS:-0}
      # Host TLS port suffix for HTTP→HTTPS redirect (empty when HTTPS is on host :443).
      REVERSE_PROXY_HTTPS_PORT_SUFFIX: ${REVERSE_PROXY_HTTPS_PORT_SUFFIX:-:8444}
      API_PROXY_CONNECT_TIMEOUT: ${API_PROXY_CONNECT_TIMEOUT:-10s}
      API_PROXY_SEND_TIMEOUT: ${API_PROXY_SEND_TIMEOUT:-900s}
      API_PROXY_READ_TIMEOUT: ${API_PROXY_READ_TIMEOUT:-900s}
      RAG_API_PRODUCT_BASE_PATH: ${RAG_API_PRODUCT_BASE_PATH:-${NEXT_PUBLIC_RAG_API_PREFIX:-/api/v5}}
      API_CLIENT_MAX_BODY_SIZE: ${API_CLIENT_MAX_BODY_SIZE:-50m}
      WEB_CLIENT_MAX_BODY_SIZE: ${WEB_CLIENT_MAX_BODY_SIZE:-20m}
      TLS_CERT_DIR: ${TLS_CERT_DIR:-/etc/nginx/certs}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/tls.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/tls.key}
      OPENSSL_CONFIG: ${OPENSSL_CONFIG:-/etc/nginx/openssl-san.cnf}
      TLS_CERT_DAYS: ${TLS_CERT_DAYS:-365}
      TLS_CERT_COMMON_NAME: ${TLS_CERT_COMMON_NAME:-localhost}
      TLS_CERT_DNS_1: ${TLS_CERT_DNS_1:-localhost}
      TLS_CERT_DNS_2: ${TLS_CERT_DNS_2:-host.docker.internal}
      TLS_CERT_DNS_3: ${TLS_CERT_DNS_3:-}
      TLS_CERT_DNS_4: ${TLS_CERT_DNS_4:-}
      TLS_CERT_IP_1: ${TLS_CERT_IP_1:-127.0.0.1}
      TLS_CERT_IP_2: ${TLS_CERT_IP_2:-}
    restart: unless-stopped
