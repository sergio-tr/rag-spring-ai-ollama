# Optional: merge with compose.rag-dev.yml when also using compose.obs.yml
# (e.g. ./scripts/up.sh dev --rag --obs or --all).
# Activate dev,obs profiles in backend-dev and point OTLP to the otel-collector in the compose network.
services:
  backend-dev:
    environment:
      SPRING_PROFILES_ACTIVE: dev,obs
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:${OBS_INTERNAL_OTEL_OTLP_HTTP:-4318}
      OTEL_SERVICE_NAME: rag-backend-dev
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      otel-collector:
        condition: service_started
