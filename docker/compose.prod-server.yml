# Production server hardening (university application VM).
# Use with: ./docker/scripts/up.sh prod --server --obs --obs-private
# Replaces compose.prod-host-ports.yml: reverse-proxy is the only public entrypoint.
# Model serving is external (LiteLLM on the model-serving host); do not enable --ollama or --mail.
services:
  backend:
    ports: []
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,docker,infra}
      RAG_HEALTH_OLLAMA_VERIFY_MODELS: "false"
    networks:
      - public
      - private

  classifier-service:
    ports: []
    networks:
      - private
