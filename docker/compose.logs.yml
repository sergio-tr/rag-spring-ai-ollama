# Loki + Promtail. Values from observability/.env (pass --env-file ../observability/.env).
# The template is rendered at startup with the ports defined in .env.
# Also: ./scripts/up.sh dev|prod --logs

services:
  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    volumes:
      - ../observability/loki/config.yml.template:/config.yml.template:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed "s/__LOKI_HTTP_PORT__/${OBS_INTERNAL_LOKI_HTTP:-3100}/g" /config.yml.template > /tmp/loki.yml && exec /usr/bin/loki -config.file=/tmp/loki.yml
    ports:
      - "${LOKI_HOST_PORT:-3100}:${OBS_INTERNAL_LOKI_HTTP:-3100}"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.6
    container_name: promtail
    volumes:
      - ../observability/promtail/config.yml.template:/config.yml.template:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed -e "s/__LOKI_HTTP_PORT__/${OBS_INTERNAL_LOKI_HTTP:-3100}/g" -e "s/__PROMTAIL_HTTP_PORT__/${OBS_INTERNAL_PROMTAIL_HTTP:-9080}/g" /config.yml.template > /tmp/promtail.yml && exec /usr/bin/promtail -config.file=/tmp/promtail.yml
    ports:
      - "${PROMTAIL_HOST_PORT:-9080}:${OBS_INTERNAL_PROMTAIL_HTTP:-9080}"
    restart: unless-stopped
    depends_on:
      - loki
