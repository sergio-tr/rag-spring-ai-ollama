# Override to run Ollama in Docker with GPU (NVIDIA Container Toolkit required).
# Ollama is built from ollama/ (Dockerfile + .env). Pass --env-file ../ollama/.env for image/port.
# Usage: cd docker && docker compose -f docker-compose.yml -f compose.gpu.yml --env-file ../db/.env --env-file ../ollama/.env up -d

services:
  ollama:
    build:
      context: ../ollama
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${OLLAMA_BASE_IMAGE:-ollama/ollama:latest}
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama_data:
