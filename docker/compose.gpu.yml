# NVIDIA runtime override for classifier-service (merged only when ./docker/scripts/up.sh is called with --classifier-gpu and the host has the NVIDIA runtime).
# Ollama in Docker uses profile "ollama" in docker-compose.yml. Remote/host URL: OLLAMA_BASE_URL / SPRING_AI_OLLAMA_BASE_URL in rag-service/.env.

services:
  classifier-service:
    build:
      args:
        BASE_IMAGE: ${CLASSIFIER_PYTHON_BASE_IMAGE:-nvidia/cuda:12.5.1-cudnn-runtime-ubuntu22.04}
        INSTALL_GPU_EXTRAS: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility