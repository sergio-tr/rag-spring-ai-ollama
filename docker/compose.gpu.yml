# NVIDIA runtime override for classifier-service (merged only when ./docker/scripts/up.sh is called with --classifier-gpu and the host has the NVIDIA runtime).
# Ollama in Docker uses profile "ollama" in docker-compose.yml. Remote/host URL: OLLAMA_BASE_URL / SPRING_AI_OLLAMA_BASE_URL in rag-service/.env.

services:
  classifier-service:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
