# NVIDIA runtime override for classifier-service (merged when the host has the NVIDIA runtime).
# Ollama in Docker uses profile "ollama" in docker-compose.yml. Remote LLM URL: compose.ollama-remote.yml.

services:
  classifier-service:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
