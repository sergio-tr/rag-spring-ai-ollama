# Override to run Ollama in Docker with GPU (NVIDIA Container Toolkit required).
# Usage: docker compose -f docker-compose.yml -f compose.gpu.yml up -d
# Image from .env: OLLAMA_IMAGE (default ollama/ollama:latest).

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434

volumes:
  ollama_data:
