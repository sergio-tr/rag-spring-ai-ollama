# Dev full stack in Docker: nginx + webapp + backend-dev (requires compose.dev.yml and profile "rag").
# Use: ./docker/scripts/up.sh dev --rag --webapp ... or ./docker/scripts/up.sh dev --all (includes --webapp).

services:
  webapp:
    depends_on:
      backend-dev:
        condition: service_started

  reverse-proxy:
    build:
      context: ../reverse-proxy
      dockerfile: Dockerfile
    container_name: reverse-proxy-dev
    depends_on:
      backend-dev:
        condition: service_started
      webapp:
        condition: service_started
    ports:
      - "${DEV_REVERSE_PROXY_HTTP_PORT:-9080}:80"
      - "${DEV_REVERSE_PROXY_HTTPS_PORT:-9443}:443"
    environment:
      BACKEND_HOST: backend-dev
      BACKEND_INTERNAL_PORT: ${SERVER_PORT:-9000}
    restart: unless-stopped
