# Development override — hot-reload for classifier-service via bind-mount.
#
# RECOMMENDED WORKFLOW (hybrid: infra in Docker, backend+classifier in local):
#   ./scripts/dev.sh          # starts only postgres (+ ollama if --gpu)
#   cd rag-service && ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#   cd classifier-service && uvicorn main:app --reload --reload-dir app
#
# ALTERNATIVE: keep classifier in Docker with hot-reload (backend still local):
#   cd docker
#   docker compose -f docker-compose.yml -f compose.dev.yml \
#     --env-file ../db/.env --env-file ../classifier-service/.env \
#     up -d postgres classifier-service
#   cd rag-service && ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# Changes to classifier-service/app/*.py are detected immediately by uvicorn --reload.
# Changes to classifier-service/models/ or data/ do NOT trigger reload (excluded from watch).

services:
  # Override classifier-service to mount source code and use uvicorn --reload
  classifier-service:
    # Do not use the pre-built image: run from source directly
    build:
      context: ../classifier-service
      dockerfile: Dockerfile.dev
    volumes:
      # Bind-mount application source — changes trigger uvicorn --reload
      - ../classifier-service/app:/app/app
      - ../classifier-service/main.py:/app/main.py
      # Models and data still copied (not expected to change during dev)
      # To override model path, set MODEL_PATH env var in classifier-service/.env
    environment:
      # Uvicorn --reload is set in Dockerfile.dev CMD; no extra env needed
      PORT: ${PORT:-8000}
      MODELS_DIR: ${MODELS_DIR:-/app/models}
      DATA_DIR: ${DATA_DIR:-/app/data}
    # In dev, a simpler healthcheck that doesn't require python on PATH
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Remove backend from compose.dev.yml stack — run it locally instead.
  # If you need the backend in Docker for some reason, keep it from docker-compose.yml
  # (no overrides needed; just don't start it: docker compose up -d postgres classifier-service).
