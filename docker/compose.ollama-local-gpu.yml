# Local Ollama container with NVIDIA GPU. Merged only when --gpu/--ollama is set, NVIDIA is available,
# and --ollama-remote is NOT set (docker/scripts/docker-compose.sh).

services:
  ollama:
    build:
      context: ../ollama
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${OLLAMA_BASE_IMAGE:-ollama/ollama:latest}
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_started

volumes:
  ollama_data:
