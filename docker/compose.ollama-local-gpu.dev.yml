# Dev-only: point backend-dev at the local Ollama container. Use with compose.dev.yml and compose.ollama-local-gpu.yml.

services:
  backend-dev:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_started
