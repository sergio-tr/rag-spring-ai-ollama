# Ollama in Docker with NVIDIA GPU (NVIDIA Container Toolkit + drivers required).
# Build from ollama/ (Dockerfile). Pass --env-file ../ollama/.env for image/port overrides.
#
# Use this OR compose.ollama.yml (CPU), not both — same service name `ollama`.
#
# Usage:
#   cd docker && docker compose -f docker-compose.yml -f compose.ollama-gpu.yml \
#     --env-file ../db/.env --env-file ../classifier-service/.env --env-file ../rag-service/.env --env-file ../ollama/.env up -d

services:
  ollama:
    build:
      context: ../ollama
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${OLLAMA_BASE_IMAGE:-ollama/ollama:latest}
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      classifier-service:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  ollama_data:
