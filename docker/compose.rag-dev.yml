# Optional: rag-service (Spring) in Docker with code volume + DevTools reload + mvn compile loop.
# Activate with: ./scripts/up.sh dev --rag [...]
# If you also use observability (--obs or --all), the script adds compose.rag-dev-obs.yml (OTLP → otel-collector).
#
# In rag-service/.env, if Ollama is in the same compose (e.g. --gpu/--ollama), use:
#   SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
# If Ollama is on the host: host.docker.internal (Docker Desktop) or the host IP in Linux.
#
services:
  backend-dev:
    build:
      context: ../rag-service
      dockerfile: Dockerfile.dev
      args:
        JDK_BASE_IMAGE: ${RAG_JAVA_JDK_BASE_IMAGE:-eclipse-temurin:21-jdk}
        SERVER_PORT: ${SERVER_PORT:-9000}
    container_name: backend-dev
    env_file:
      - ../db/.env
      - ../rag-service/.env
    ports:
      - "${BACKEND_PORT:-9000}:${SERVER_PORT:-9000}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-9000}
      RAG_DEV_POLL_INTERVAL: ${RAG_DEV_POLL_INTERVAL:-2}
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vectordb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      RAG_CLASSIFIER_SERVICE_URL: http://classifier-service:${PORT:-8000}
    volumes:
      - ../rag-service:/app
      - rag_m2_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      classifier-service:
        condition: service_healthy
    healthcheck:
      # Liveness (JVM), no readiness: Ollama is pulling models, the readiness returns 503.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SERVER_PORT:-9000}/actuator/health/liveness >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

volumes:
  rag_m2_cache:
