# Ollama in Docker (CPU, official image). Use when you do NOT run Ollama on the host.
# Without any compose Ollama file, the backend defaults to host.docker.internal:11434 — if Ollama is not
# running on the host, you get ResourceAccessException on /api/embed and /api/chat.
#
# For NVIDIA GPU + custom build from ollama/, use compose.ollama-gpu.yml instead (not both at once).
#
# Usage (with observability + logs, typical full stack):
#   cd docker && docker compose -f docker-compose.yml -f compose.obs.yml -f compose.logs.yml -f compose.ollama.yml \
#     --env-file ../db/.env --env-file ../classifier-service/.env --env-file ../rag-service/.env --env-file ../observability/.env up -d
#
# After first start, pull models (required for chat + embeddings):
#   docker exec -it ollama ollama pull gemma3:4b
#   docker exec -it ollama ollama pull mxbai-embed-large
# (Match SPRING_AI_OLLAMA_CHAT_MODEL / SPRING_AI_OLLAMA_EMBEDDING_MODEL in rag-service/.env)

services:
  ollama:
    image: ${OLLAMA_BASE_IMAGE:-ollama/ollama:latest}
    container_name: ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 15s
      retries: 10
      start_period: 20s

  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      classifier-service:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
