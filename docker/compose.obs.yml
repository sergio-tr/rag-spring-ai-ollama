# Observability stack: OTEL Collector, Jaeger, Prometheus, Grafana (all built from Dockerfiles).
# Base images and ports from observability/.env (create with scripts/create-env-observability.sh).
# Usage: cd docker && docker compose -f docker-compose.yml -f compose.obs.yml --env-file ../db/.env --env-file ../observability/.env up -d
# Jaeger UI: http://localhost:${JAEGER_UI_PORT:-16686} | Prometheus: http://localhost:${PROMETHEUS_PORT:-9090} | Grafana: http://localhost:${GRAFANA_PORT:-3000}

services:
  backend:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: rag-backend
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      otel-collector:
        condition: service_started

  classifier-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: classifier-service
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
    depends_on:
      otel-collector:
        condition: service_started

  otel-collector:
    build:
      context: ../observability/otel-collector
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${OTEL_COLLECTOR_BASE_IMAGE:-otel/opentelemetry-collector-contrib:0.102.0}
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
      - "${OTEL_PROMETHEUS_SCRAPE_PORT:-8889}:8889"
    restart: unless-stopped

  jaeger:
    build:
      context: ../observability/jaeger
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${JAEGER_BASE_IMAGE:-jaegertracing/jaeger:2}
    container_name: jaeger
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_COLLECTOR_PORT:-14268}:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  prometheus:
    build:
      context: ../observability/prometheus
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${PROMETHEUS_BASE_IMAGE:-prom/prometheus:v2.52.0}
    container_name: prometheus
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    depends_on:
      - otel-collector

  grafana:
    build:
      context: ../observability/grafana
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${GRAFANA_BASE_IMAGE:-grafana/grafana:11.2.0}
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus
      - jaeger

volumes:
  prometheus_data:
  grafana_data:
