# Main stack: DB, classifier, backend. Uses db/.env, classifier-service/.env, rag-service/.env (create with scripts in scripts/).
# Run: cd docker && docker compose --env-file ../db/.env --env-file ../classifier-service/.env --env-file ../rag-service/.env up -d
services:
  postgres:
    build:
      context: ../db
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${POSTGRES_BASE_IMAGE:-postgres:16}
    container_name: postgres
    env_file:
      - ../db/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectordb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectordb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  classifier-service:
    build:
      context: ../classifier-service
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${CLASSIFIER_PYTHON_BASE_IMAGE:-python:3.11-slim}
        PORT: ${PORT:-8000}
        MODELS_DIR: ${MODELS_DIR:-/app/models}
        DATA_DIR: ${DATA_DIR:-/app/data}
    container_name: classifier-service
    env_file:
      - ../classifier-service/.env
    ports:
      - "${CLASSIFIER_SERVICE_PORT:-8000}:${PORT:-8000}"
    environment:
      PORT: ${PORT:-8000}
      MODELS_DIR: ${MODELS_DIR:-/app/models}
      DATA_DIR: ${DATA_DIR:-/app/data}
    restart: unless-stopped
    healthcheck:
      # Process up and /health returns 200. Stricter checks (model loaded, classify OK) are in the backend Actuator readiness.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\" || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ../rag-service
      dockerfile: Dockerfile
      args:
        JDK_BASE_IMAGE: ${RAG_JAVA_JDK_BASE_IMAGE:-eclipse-temurin:21-jdk}
        JRE_BASE_IMAGE: ${RAG_JAVA_JRE_BASE_IMAGE:-eclipse-temurin:21-jre-alpine}
        SERVER_PORT: ${SERVER_PORT:-9000}
    container_name: backend
    env_file:
      - ../db/.env
      - ../rag-service/.env
    ports:
      - "${BACKEND_PORT:-9000}:${SERVER_PORT:-9000}"
    environment:
      SERVER_PORT: ${SERVER_PORT:-9000}
      # Disables OTLP to localhost inside the JVM; compose.obs.yml adds profile "obs" and sets OTEL_* to the collector.
      SPRING_PROFILES_ACTIVE: docker
      # DB connection (same user/password as in db/.env)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-vectordb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_AI_OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      SPRING_AI_OLLAMA_CHAT_MODEL: ${SPRING_AI_OLLAMA_CHAT_MODEL:-gemma3:4b}
      SPRING_AI_OLLAMA_EMBEDDING_MODEL: ${SPRING_AI_OLLAMA_EMBEDDING_MODEL:-mxbai-embed-large}
      RAG_CLASSIFIER_SERVICE_URL: http://classifier-service:${PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
      classifier-service:
        condition: service_healthy
    healthcheck:
      # Liveness = JVM up (management.endpoint.health.probes.enabled in application-docker.properties).
      # Readiness (/actuator/health/readiness) is 503 while Ollama is pulling models — do not use it for Docker.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SERVER_PORT:-9000}/actuator/health/liveness >/dev/null || exit 1"]
      interval: 20s
      timeout: 12s
      retries: 6
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres_data:
