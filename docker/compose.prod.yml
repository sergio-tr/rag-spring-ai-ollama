services:
  # Backend only exposed through reverse proxy in prod local
  backend:
    ports: []
    environment:
      # In prod local/prod we don't use ddl-auto=update. It is controlled by migrations (Flyway).
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    networks:
      - public
      - private

  postgres:
    # Do not expose Postgres on the host in prod local
    ports: []
    networks:
      - private

  # Must share `private` with postgres; default network cannot resolve the `postgres` hostname.
  postgres-collation-bootstrap:
    networks:
      - private

  classifier-service:
    ports: []
    networks:
      - private

  webapp:
    ports: []
    networks:
      - public
    environment:
      # Allow BFF auth cookies over HTTP reverse-proxy (Playwright fullstack on :80).
      E2E_ALLOW_INSECURE_COOKIES: ${E2E_ALLOW_INSECURE_COOKIES:-true}
    depends_on:
      backend:
        condition: service_started

  # Web entrypoint: terminate HTTP/TLS and route / -> webapp, /api/* -> backend.

  reverse-proxy:
    build:
      context: ../reverse-proxy
      dockerfile: Dockerfile
    depends_on:
      - backend
      - webapp
    ports:
      - "${REVERSE_PROXY_HTTP_PORT:-80}:80"
      - "${REVERSE_PROXY_HTTPS_PORT:-8443}:443"
    volumes:
      - reverse_proxy_certs:/etc/nginx/certs
    environment:
      BACKEND_HOST: backend
      BACKEND_INTERNAL_PORT: ${SERVER_PORT:-9000}
      WEBAPP_HOST: webapp
      WEBAPP_INTERNAL_PORT: ${WEBAPP_CONTAINER_PORT:-3000}
      REVERSE_PROXY_SERVER_NAME: ${REVERSE_PROXY_SERVER_NAME:-localhost}
      REVERSE_PROXY_ENFORCE_HTTPS: ${REVERSE_PROXY_ENFORCE_HTTPS:-0}
      # Empty suffix when host HTTPS is on :443; set to :8443 for local prod-like testing.
      REVERSE_PROXY_HTTPS_PORT_SUFFIX: ${REVERSE_PROXY_HTTPS_PORT_SUFFIX:-}
      API_PROXY_CONNECT_TIMEOUT: ${API_PROXY_CONNECT_TIMEOUT:-10s}
      API_PROXY_SEND_TIMEOUT: ${API_PROXY_SEND_TIMEOUT:-180s}
      API_PROXY_READ_TIMEOUT: ${API_PROXY_READ_TIMEOUT:-180s}
      RAG_API_PRODUCT_BASE_PATH: ${RAG_API_PRODUCT_BASE_PATH:-${NEXT_PUBLIC_RAG_API_PREFIX:-/api/v5}}
      API_CLIENT_MAX_BODY_SIZE: ${API_CLIENT_MAX_BODY_SIZE:-50m}
      WEB_CLIENT_MAX_BODY_SIZE: ${WEB_CLIENT_MAX_BODY_SIZE:-20m}
      TLS_CERT_DIR: ${TLS_CERT_DIR:-/etc/nginx/certs}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/tls.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/tls.key}
      OPENSSL_CONFIG: ${OPENSSL_CONFIG:-/etc/nginx/openssl-san.cnf}
      TLS_CERT_DAYS: ${TLS_CERT_DAYS:-365}
      TLS_CERT_COMMON_NAME: ${TLS_CERT_COMMON_NAME:-localhost}
      TLS_CERT_DNS_1: ${TLS_CERT_DNS_1:-localhost}
      TLS_CERT_DNS_2: ${TLS_CERT_DNS_2:-}
      TLS_CERT_DNS_3: ${TLS_CERT_DNS_3:-}
      TLS_CERT_DNS_4: ${TLS_CERT_DNS_4:-}
      TLS_CERT_IP_1: ${TLS_CERT_IP_1:-127.0.0.1}
      TLS_CERT_IP_2: ${TLS_CERT_IP_2:-}
    networks:
      - public
    restart: unless-stopped

networks:
  public:
  private:

