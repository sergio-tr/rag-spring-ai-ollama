[pytest]
# Project root must be on sys.path so `from app...` imports resolve (same layout as `python -m pytest` from this directory).
pythonpath = .

# Default test discovery path
testpaths = tests

# Coverage flags applied to every pytest run (local and CI).
# CI does NOT duplicate these flags — the workflow just passes test paths and markers.
# sonar-project.properties reads classifier-service/coverage.xml produced here.
addopts =
    -v
    --tb=short
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=xml:coverage.xml

# Markers used in the test suite
markers =
    unit: Pure unit tests (no external services)
    integration: Tests that require a running service
    regression: Baseline regression tests for classifier model
    slow: Tests that take more than a few seconds
